<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white text-center p-4">
    <div class="w-full flex justify-between p-4 absolute top-0 left-0">
        <a href="/" class="text-white hover:underline text-lg sm:text-sm">Return to Home</a>
        <a href="/logout" class="text-white hover:underline text-lg sm:text-sm">Logout</a>
    </div>
    <h1 class="text-4xl font-bold mb-2">Approve Questions</h1>
    <p id="pending-count" class="text-gray-400 mb-6">Loading…</p>

    <div class="w-full max-w-6xl bg-gray-800 p-4 rounded-lg shadow mb-4 grid grid-cols-1 md:grid-cols-3 gap-3">
        <input id="filter-text" type="text" placeholder="Search question text" class="p-2 rounded text-black">
        <input id="filter-topic" type="text" placeholder="Topic" class="p-2 rounded text-black">
        <input id="filter-language" type="text" placeholder="Language" class="p-2 rounded text-black">
        <div class="md:col-span-3 flex gap-2">
            <button onclick="loadQuestions()" class="bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded">Apply Filters</button>
            <button onclick="clearFilters()" class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded">Clear</button>
        </div>
    </div>

    <div class="overflow-x-auto w-full max-w-6xl">
    <table class="w-full text-left border-collapse bg-gray-800 p-6 rounded-lg shadow-lg" id="questions-table">
        <thead>
            <tr>
                <th class="border-b p-2 cursor-pointer" onclick="sortBy('question')">Question <span id="sort-question"></span></th>
                <th class="border-b p-2 cursor-pointer" onclick="sortBy('answer')">Answer <span id="sort-answer"></span></th>
                <th class="border-b p-2 cursor-pointer" onclick="sortBy('question_topic')">Topic <span id="sort-question_topic"></span></th>
                <th class="border-b p-2 cursor-pointer" onclick="sortBy('added_by')">Added by <span id="sort-added_by"></span></th>
                <th class="border-b p-2 cursor-pointer" onclick="sortBy('language')">Lang <span id="sort-language"></span></th>
                <th class="border-b p-2 cursor-pointer" onclick="sortBy('added_at')">Added <span id="sort-added_at"></span></th>
                <th class="border-b p-2">Actions</th>
            </tr>
        </thead>
        <tbody id="question-list"></tbody>
    </table>
    </div>

    <!-- Edit Panel -->
    <div id="edit-panel" class="w-full max-w-3xl bg-gray-800 p-6 rounded-lg shadow-lg mt-6 hidden">
        <h2 class="text-2xl font-semibold mb-4">Edit Question</h2>
        <form id="edit-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="edit-question" type="text" placeholder="Question" class="w-full p-2 rounded text-black" required>
            <input id="edit-answer" type="text" placeholder="Answer" class="w-full p-2 rounded text-black" required>
            <input id="edit-added-by" type="text" placeholder="Added by" class="w-full p-2 rounded text-black" required>
            <input id="edit-topic" type="text" placeholder="Topic (Optional)" class="w-full p-2 rounded text-black">
            <input id="edit-qsource" type="text" placeholder="Question Source (Optional)" class="w-full p-2 rounded text-black">
            <input id="edit-asource" type="text" placeholder="Answer Source (Optional)" class="w-full p-2 rounded text-black">
            <input id="edit-incorrect" type="text" placeholder="Incorrect Answers (comma-separated)" class="w-full p-2 rounded text-black">
            <input id="edit-tags" type="text" placeholder="Tags (comma-separated)" class="w-full p-2 rounded text-black">
            <select id="edit-language" class="w-full p-2 rounded text-black">
                <option value="">Language (optional)</option>
                <option value="English">English</option>
                <option value="German">German</option>
                <option value="French">French</option>
            </select>
            <div class="col-span-full flex gap-2 justify-end mt-2">
                <button type="button" onclick="hideEdit()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded">Cancel</button>
                <button type="submit" class="bg-green-500 hover:bg-green-700 text-white px-4 py-2 rounded">Save</button>
            </div>
        </form>
    </div>

    <script>
        let allQuestions = [];
        let questionCache = {};
        let editingId = null;
        let sortField = null;
        let sortAsc = true;
        let currentPage = 1;
        const pageSize = 20;

        async function loadQuestions() {
            const txt = document.getElementById("filter-text").value.trim();
            const topic = document.getElementById("filter-topic").value.trim();
            const lang = document.getElementById("filter-language").value.trim();

            allQuestions = [];
            let pageToken = null;
            do {
                const params = new URLSearchParams({ limit: 100, offset: 0, review_status: false });
                if (pageToken) params.set("page_token", pageToken);
                if (topic) params.set("question_topic", topic);
                if (lang) params.set("language", lang);
                const response = await fetch(`/questions/?${params.toString()}`);
                if (!response.ok) break;
                const payload = await response.json();
                allQuestions.push(...(payload.items || []));
                pageToken = payload.pagination?.next_page_token;
            } while (pageToken && allQuestions.length < 2000);

            if (txt) {
                allQuestions = allQuestions.filter(q => (q.question || "").toLowerCase().includes(txt.toLowerCase()));
            }

            document.getElementById("pending-count").textContent =
                `${allQuestions.length} question${allQuestions.length !== 1 ? "s" : ""} pending approval`;

            applySort();
            currentPage = 1;
            renderPage();
            updateSortIndicators();
        }

        function renderPage() {
            const questionList = document.getElementById("question-list");
            questionList.innerHTML = "";
            questionCache = {};

            const start = (currentPage - 1) * pageSize;
            const slice = allQuestions.slice(start, start + pageSize);

            if (slice.length === 0) {
                questionList.innerHTML = `<tr><td colspan="7" class="p-6 text-gray-400 text-center">No pending questions found.</td></tr>`;
                return;
            }

            slice.forEach(q => {
                const id = q.id || q.question_id;
                questionCache[id] = q;
                const row = `<tr>
                    <td class="border-b p-2 max-w-xs">
                        <a class="text-blue-400 hover:underline" href="/questions/${id}" target="_blank">${escHtml(q.question)}</a>
                    </td>
                    <td class="border-b p-2 max-w-xs">${escHtml(q.answer)}</td>
                    <td class="border-b p-2">${escHtml(q.question_topic || "General")}</td>
                    <td class="border-b p-2">${escHtml(q.added_by)}</td>
                    <td class="border-b p-2">${escHtml(q.language || "-")}</td>
                    <td class="border-b p-2">${q.added_at ? new Date(q.added_at).toLocaleDateString() : "-"}</td>
                    <td class="border-b p-2">
                        <div class="flex gap-2 flex-wrap">
                            <button onclick='approve("${id}")' class="bg-green-500 hover:bg-green-700 text-white font-bold py-1 px-3 rounded">Approve</button>
                            <button onclick='reject("${id}")' class="bg-red-500 hover:bg-red-700 text-white font-bold py-1 px-3 rounded">Reject</button>
                            <button onclick='startEdit("${id}")' class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-1 px-3 rounded">Edit</button>
                        </div>
                    </td>
                </tr>`;
                questionList.innerHTML += row;
            });

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.max(1, Math.ceil(allQuestions.length / pageSize));
            const questionList = document.getElementById("question-list");
            const pager = document.createElement("tr");
            pager.innerHTML = `<td colspan="7" class="p-3 text-center space-x-2">
                <button ${currentPage === 1 ? "disabled" : ""} class="bg-gray-700 hover:bg-gray-600 disabled:opacity-40 text-white px-3 py-1 rounded" onclick="gotoPage(${Math.max(1, currentPage - 1)})">Prev</button>
                <span>Page ${currentPage} / ${totalPages}</span>
                <button ${currentPage === totalPages ? "disabled" : ""} class="bg-gray-700 hover:bg-gray-600 disabled:opacity-40 text-white px-3 py-1 rounded" onclick="gotoPage(${Math.min(totalPages, currentPage + 1)})">Next</button>
            </td>`;
            questionList.appendChild(pager);
        }

        function gotoPage(page) {
            const totalPages = Math.max(1, Math.ceil(allQuestions.length / pageSize));
            currentPage = Math.min(Math.max(1, page), totalPages);
            renderPage();
        }

        async function approve(id) {
            await setApproval(id, true);
        }

        async function reject(id) {
            await setApproval(id, false);
        }

        async function setApproval(id, approved) {
            const response = await fetch(`/questions/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ review_status: approved })
            });
            if (response.ok) {
                // Remove from local list immediately for snappy UX, then reload
                allQuestions = allQuestions.filter(q => (q.id || q.question_id) !== id);
                document.getElementById("pending-count").textContent =
                    `${allQuestions.length} question${allQuestions.length !== 1 ? "s" : ""} pending approval`;
                renderPage();
            } else {
                const err = await response.json().catch(() => ({}));
                alert(err.error || "Error updating question.");
            }
        }

        function startEdit(id) {
            const q = questionCache[id];
            if (!q) return;
            editingId = id;
            document.getElementById("edit-question").value = q.question || "";
            document.getElementById("edit-answer").value = q.answer || "";
            document.getElementById("edit-added-by").value = q.added_by || "";
            document.getElementById("edit-topic").value = q.question_topic || "";
            document.getElementById("edit-qsource").value = q.question_source || "";
            document.getElementById("edit-asource").value = q.answer_source || "";
            document.getElementById("edit-incorrect").value = (q.incorrect_answers || []).join(", ");
            document.getElementById("edit-tags").value = (q.tags || []).join(", ");
            document.getElementById("edit-language").value = q.language || "";
            document.getElementById("edit-panel").classList.remove("hidden");
            document.getElementById("edit-panel").scrollIntoView({ behavior: "smooth" });
        }

        function hideEdit() {
            editingId = null;
            document.getElementById("edit-panel").classList.add("hidden");
        }

        document.getElementById("edit-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!editingId) return;
            const payload = {
                question: document.getElementById("edit-question").value,
                answer: document.getElementById("edit-answer").value,
                added_by: document.getElementById("edit-added-by").value,
                question_topic: document.getElementById("edit-topic").value || null,
                question_source: document.getElementById("edit-qsource").value || null,
                answer_source: document.getElementById("edit-asource").value || null,
                incorrect_answers: document.getElementById("edit-incorrect").value.split(",").map(s => s.trim()).filter(Boolean),
                tags: document.getElementById("edit-tags").value.split(",").map(s => s.trim()).filter(Boolean),
                language: document.getElementById("edit-language").value || null,
            };

            const response = await fetch(`/questions/${editingId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                hideEdit();
                loadQuestions();
            } else {
                const err = await response.json().catch(() => ({}));
                alert(err.error || "Error updating question.");
            }
        });

        function clearFilters() {
            document.getElementById("filter-text").value = "";
            document.getElementById("filter-topic").value = "";
            document.getElementById("filter-language").value = "";
            sortField = null;
            sortAsc = true;
            loadQuestions();
        }

        function sortBy(field) {
            if (sortField === field) {
                sortAsc = !sortAsc;
            } else {
                sortField = field;
                sortAsc = true;
            }
            applySort();
            renderPage();
            updateSortIndicators();
        }

        function applySort() {
            if (!sortField) return;
            allQuestions.sort((a, b) => {
                const va = (a[sortField] || "").toString().toLowerCase();
                const vb = (b[sortField] || "").toString().toLowerCase();
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        function updateSortIndicators() {
            ["question", "answer", "question_topic", "added_by", "language", "added_at"].forEach(f => {
                const el = document.getElementById(`sort-${f}`);
                if (!el) return;
                if (f === sortField) {
                    el.textContent = sortAsc ? "▲" : "▼";
                } else {
                    el.textContent = "";
                }
            });
        }

        function escHtml(str) {
            return String(str ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        loadQuestions();
    </script>
</body>
</html>
