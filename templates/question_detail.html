{% extends "base.html" %}

{% block title %}Question Detail{% endblock %}
{% block mobile_title %}QUESTION DETAIL{% endblock %}

{% block content %}
<main class="pt-8 pb-10 px-4 sm:px-6 max-w-4xl mx-auto">
    <a id="back-link" href="/my_questions" class="inline-flex items-center gap-1.5 text-sm text-muted hover:text-white transition-colors mb-6">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to list
    </a>

    <div class="bg-card border border-border rounded-2xl p-6 sm:p-8">
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- Info -->
            <div class="flex-1 space-y-3">
                <h1 id="q-text" class="text-xl font-bold"></h1>
                <p id="q-answer" class="text-emerald-400 font-medium"></p>
                <div class="grid grid-cols-2 gap-x-6 gap-y-2 text-sm pt-2">
                    <p id="q-topic" class="text-gray-400"></p>
                    <p id="q-lang" class="text-gray-400"></p>
                    <p id="q-added" class="text-gray-400 col-span-2"></p>
                    <p id="q-tags" class="text-gray-400 col-span-2"></p>
                    <p id="q-points" class="text-gray-400"></p>
                    <p id="q-review" class="text-gray-400"></p>
                    <p id="q-incorrect" class="text-gray-400 col-span-2"></p>
                    <p id="q-stats" class="text-muted col-span-2"></p>
                    <p id="q-asource" class="text-muted col-span-2"></p>
                </div>
                <div id="q-history" class="text-muted text-xs pt-1"></div>
            </div>
            <!-- Media -->
            <div class="lg:w-1/3 w-full">
                <div id="media-container" class="bg-card-alt border border-border rounded-xl p-3 flex items-center justify-center min-h-[200px]">
                    <p class="text-sm text-muted">No media attached</p>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-6 flex flex-wrap gap-2">
            <button id="approve-btn" class="hidden text-sm font-medium px-4 py-2 rounded-lg transition-colors" onclick="toggleApproval()"></button>
            <button id="edit-btn" class="hidden text-sm font-medium px-4 py-2 rounded-lg bg-warning/10 text-warning hover:bg-warning/20 transition-colors" onclick="startEdit()">Edit</button>
            <button id="delete-btn" class="hidden text-sm font-medium px-4 py-2 rounded-lg bg-danger/10 text-danger hover:bg-danger/20 transition-colors" onclick="deleteQuestion()">Delete</button>
        </div>

        <!-- Edit panel -->
        <div id="edit-panel" class="mt-6 border-t border-border pt-6 hidden space-y-3">
            <h2 class="text-lg font-semibold mb-2">Edit Question</h2>
            <input id="edit-question" type="text" class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" placeholder="Question">
            <input id="edit-answer" type="text" class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" placeholder="Answer">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <input id="edit-topic" type="text" class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" placeholder="Topic">
                <input id="edit-language" type="text" class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" placeholder="Language">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <input id="edit-tags" type="text" class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" placeholder="Tags (comma-separated)">
                <input id="edit-points" type="number" min="1" max="10" class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" placeholder="Points">
            </div>
            <input id="edit-answer-source" type="text" class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" placeholder="Answer source (e.g. Wikipedia link)">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Media</label>
                <input id="edit-media" type="file" class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-2 text-sm file:mr-3 file:bg-card file:border-0 file:text-gray-300 file:rounded file:px-2 file:py-1 file:text-xs">
                <label class="flex items-center gap-2 mt-2 text-sm text-gray-400">
                    <input id="remove-media" type="checkbox" class="w-4 h-4 rounded accent-primary">
                    Remove existing media
                </label>
            </div>
            <label class="flex items-center gap-2 text-sm text-gray-300">
                <input id="edit-reviewed" type="checkbox" class="w-4 h-4 rounded accent-primary">
                Reviewed
            </label>
            <div class="flex gap-2 pt-2">
                <button onclick="saveEdit()" class="bg-success hover:bg-success-hover text-gray-900 text-sm font-medium px-4 py-2 rounded-lg transition-colors">Save</button>
                <button onclick="cancelEdit()" class="bg-card-alt hover:bg-border text-gray-300 text-sm font-medium px-4 py-2 rounded-lg border border-border transition-colors">Cancel</button>
            </div>
            <p id="err" class="text-sm text-danger"></p>
        </div>
    </div>
</main>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center cursor-zoom-out hidden" onclick="closeLightbox()">
    <button class="absolute top-4 right-4 text-white/60 hover:text-white transition-colors z-10 cursor-pointer" onclick="closeLightbox()">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div id="lightbox-content" class="flex items-center justify-center cursor-default" onclick="event.stopPropagation()"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const parts = window.location.pathname.split("/").filter(Boolean);
    const questionId = parts[1] || parts[0];
    let questionData = null;

    // Set back link: use referrer if from same origin, otherwise pick based on role
    (async () => {
        const ref = document.referrer;
        const sameOrigin = ref && new URL(ref).origin === window.location.origin;
        if (sameOrigin) {
            document.getElementById("back-link").href = ref;
        } else {
            try {
                const status = await fetch("/login-status").then(r => r.json());
                document.getElementById("back-link").href = status.role === "admin" ? "/database" : "/my_questions";
            } catch {}
        }
    })();

    async function loadQuestion() {
        const resp = await fetch(`/questions/${questionId}`, { headers: { "Accept": "application/json" } });
        if (!resp.ok) { document.getElementById("q-text").textContent = "Question not found"; return; }
        questionData = await resp.json();
        document.getElementById("q-text").textContent = questionData.question;
        document.getElementById("q-answer").textContent = `Answer: ${questionData.answer}`;
        document.getElementById("q-topic").textContent = `Topic: ${questionData.question_topic || "General"}`;
        document.getElementById("q-lang").textContent = `Language: ${questionData.language || "-"}`;
        document.getElementById("q-added").textContent = `Added by ${questionData.added_by} on ${questionData.added_at ? new Date(questionData.added_at).toLocaleDateString() : "-"}`;
        document.getElementById("q-tags").textContent = `Tags: ${(questionData.tags || []).join(", ") || "-"}`;
        document.getElementById("q-points").textContent = `Points: ${questionData.points || 1}`;
        document.getElementById("q-review").textContent = `Reviewed: ${questionData.review_status ? "Yes" : "No"}`;
        document.getElementById("q-incorrect").textContent = `Incorrect answers: ${(questionData.incorrect_answers || []).join(", ") || "-"}`;
        document.getElementById("q-stats").textContent = `Asked ${questionData.times_asked || 0} times | Correct: ${questionData.times_correct || 0} | Incorrect: ${questionData.times_incorrect || 0}`;
        document.getElementById("q-asource").textContent = `Answer source: ${questionData.answer_source || "-"}`;
        const history = questionData.update_history || [];
        document.getElementById("q-history").textContent = history.length ? `Edits: ${history.length}` : "Edits: none";
        renderMedia(questionData.media_path);
        updateApproveButton();
        document.getElementById("edit-btn").classList.remove("hidden");
        document.getElementById("delete-btn").classList.remove("hidden");
        document.getElementById("approve-btn").classList.remove("hidden");
    }

    function startEdit() {
        document.getElementById("edit-panel").classList.remove("hidden");
        document.getElementById("edit-question").value = questionData.question || "";
        document.getElementById("edit-answer").value = questionData.answer || "";
        document.getElementById("edit-topic").value = questionData.question_topic || "";
        document.getElementById("edit-language").value = questionData.language || "";
        document.getElementById("edit-tags").value = (questionData.tags || []).join(", ");
        document.getElementById("edit-points").value = questionData.points || 1;
        document.getElementById("edit-answer-source").value = questionData.answer_source || "";
        document.getElementById("edit-reviewed").checked = !!questionData.review_status;
    }

    function cancelEdit() { document.getElementById("edit-panel").classList.add("hidden"); }

    async function saveEdit() {
        const current = {
            question: document.getElementById("edit-question").value,
            answer: document.getElementById("edit-answer").value,
            question_topic: document.getElementById("edit-topic").value || "",
            language: document.getElementById("edit-language").value || "",
            tags: document.getElementById("edit-tags").value || "",
            answer_source: document.getElementById("edit-answer-source").value || "",
            points: parseInt(document.getElementById("edit-points").value) || 1,
            review_status: document.getElementById("edit-reviewed").checked,
        };
        const original = {
            question: questionData.question || "",
            answer: questionData.answer || "",
            question_topic: questionData.question_topic || "",
            language: questionData.language || "",
            tags: (questionData.tags || []).join(", "),
            answer_source: questionData.answer_source || "",
            points: questionData.points || 1,
            review_status: !!questionData.review_status,
        };

        if (current.question_topic !== original.question_topic) {
            document.getElementById("err").textContent = "Topic cannot be changed after creation.";
            return;
        }

        const formData = new FormData();
        let hasChanges = false;
        for (const key of ["question", "answer", "language", "tags", "answer_source", "points", "review_status"]) {
            if (String(current[key]) !== String(original[key])) {
                formData.append(key, current[key]);
                hasChanges = true;
            }
        }
        const fileInput = document.getElementById("edit-media");
        if (fileInput.files.length > 0) { formData.append("media", fileInput.files[0]); hasChanges = true; }
        if (document.getElementById("remove-media").checked) { formData.append("remove_media", "1"); hasChanges = true; }

        if (!hasChanges) {
            document.getElementById("edit-panel").classList.add("hidden");
            return;
        }

        const resp = await fetch(`/questions/${questionId}`, { method: "PUT", body: formData });
        if (resp.ok) {
            document.getElementById("err").textContent = "";
            document.getElementById("edit-panel").classList.add("hidden");
            loadQuestion();
        } else {
            const err = await resp.json().catch(() => ({}));
            document.getElementById("err").textContent = err.error || "Update failed.";
        }
    }

    async function toggleApproval() {
        const resp = await fetch(`/questions/${questionId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ review_status: !questionData.review_status })
        });
        if (resp.ok) loadQuestion(); else alert("Approval failed");
    }

    function renderMedia(url) {
        const container = document.getElementById("media-container");
        if (!container) return;
        container.innerHTML = "";
        if (!url) { container.innerHTML = `<p class="text-sm text-muted">No media attached</p>`; return; }
        const clean = url.split("?")[0].toLowerCase();
        if (clean.match(/\.(jpg|jpeg|png|gif|webp)$/)) {
            container.innerHTML = `<img src="${url}" alt="media" class="max-h-[300px] max-w-full object-contain rounded-lg cursor-zoom-in" onclick="openLightbox('${url}', 'image')" title="Click to enlarge">`;
        } else if (clean.match(/\.(mp4|webm)$/)) {
            const ext = clean.endsWith("webm") ? "webm" : "mp4";
            container.innerHTML = `<div class="relative w-full"><video controls class="w-full max-h-[300px] object-contain rounded-lg"><source src="${url}" type="video/${ext}"></video><button onclick="openLightbox('${url}', 'video')" class="absolute top-1 right-1 bg-black/60 hover:bg-black/90 text-white rounded-full p-1.5 transition-colors" title="Expand"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg></button></div>`;
        } else if (clean.match(/\.(mp3|wav|ogg)$/)) {
            let mime = "mpeg"; if (clean.endsWith("wav")) mime = "wav"; if (clean.endsWith("ogg")) mime = "ogg";
            container.innerHTML = `<div class="w-full bg-card-alt rounded-xl p-3"><audio controls class="w-full" style="color-scheme:dark"><source src="${url}" type="audio/${mime}"></audio></div>`;
        } else {
            container.innerHTML = `<a class="text-primary hover:text-primary-hover underline" href="${url}" target="_blank">View media</a>`;
        }
    }

    function updateApproveButton() {
        const btn = document.getElementById("approve-btn");
        const approved = !!questionData.review_status;
        btn.textContent = approved ? "Reject" : "Approve";
        btn.className = approved
            ? "text-sm font-medium px-4 py-2 rounded-lg bg-primary/10 text-primary hover:bg-primary/20 transition-colors"
            : "text-sm font-medium px-4 py-2 rounded-lg bg-success/10 text-success hover:bg-success/20 transition-colors";
    }

    async function deleteQuestion() {
        if (!confirm("Delete this question?")) return;
        const resp = await fetch(`/questions/${questionId}`, { method: "DELETE" });
        if (resp.ok) window.location.href = "/database"; else alert("Delete failed.");
    }

    function openLightbox(src, type) {
        const content = document.getElementById("lightbox-content");
        if (type === "image") {
            content.innerHTML = `<img src="${src}" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg shadow-2xl">`;
        } else {
            const ext = src.split("?")[0].split(".").pop().toLowerCase();
            content.innerHTML = `<video controls autoplay class="max-w-[90vw] max-h-[90vh] rounded-lg shadow-2xl"><source src="${src}" type="video/${ext}"></video>`;
        }
        document.getElementById("lightbox").classList.remove("hidden");
        document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
        document.getElementById("lightbox-content").innerHTML = "";
        document.getElementById("lightbox").classList.add("hidden");
        document.body.style.overflow = "";
    }

    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeLightbox(); });

    loadQuestion();
</script>
{% endblock %}
