<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Verify Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    surface: '#0f1117', card: '#181824', 'card-alt': '#1f1f2e',
                    border: '#2a2a3c', primary: '#7c6aef', 'primary-hover': '#8f7ff7',
                    success: '#34d399', 'success-hover': '#2bb886', muted: '#6b6b80', danger: '#f87171',
                },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            },
        },
    }
    </script>
    <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-surface text-gray-100 min-h-screen flex flex-col">

    <header class="fixed top-0 left-0 right-0 z-30 bg-card/80 backdrop-blur-md border-b border-border/50">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center">
            <a href="/" class="text-muted hover:text-white transition-colors flex items-center gap-1.5 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Home
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 pt-14">
        <div class="w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-8">Verify your email</h1>
            <form id="verifyForm" class="bg-card border border-border rounded-2xl p-6 sm:p-8 space-y-4">
                <p class="text-sm text-muted text-center">Enter the 6-digit code from your email</p>
                <input id="code" type="text" placeholder="000000" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm text-center tracking-[0.3em] text-lg font-mono" required>
                <button type="submit" class="w-full bg-success hover:bg-success-hover text-gray-900 font-semibold py-3 rounded-xl transition-colors">Verify</button>
                <p id="msg" class="text-sm text-center"></p>
            </form>
            <div class="text-center mt-5 space-y-2">
                <p class="text-sm"><a href="#" onclick="resendVerification()" class="text-muted hover:text-gray-300 transition-colors">Didn't receive a code? Resend</a></p>
                <p class="text-sm text-gray-400">Already verified? <a href="/login" class="text-primary hover:text-primary-hover transition-colors">Sign in</a></p>
            </div>
        </div>
    </main>

    <script>
        const msg = document.getElementById("msg");

        async function doVerify(tokenOrCode) {
            const resp = await fetch("/users/verify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token: tokenOrCode })
            });
            const res = await resp.json().catch(() => ({}));
            if (resp.ok) {
                document.getElementById("verifyForm").innerHTML = `
                    <div class="flex flex-col items-center gap-4 py-2">
                        <div class="w-16 h-16 rounded-full bg-success/20 flex items-center justify-center">
                            <svg class="w-8 h-8 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                            </svg>
                        </div>
                        <div class="text-center space-y-1">
                            <p class="text-lg font-semibold text-white">Email verified!</p>
                            <p class="text-sm text-muted">Your account is ready. Sign in to get started.</p>
                        </div>
                        <a href="/login" class="w-full mt-2 block text-center bg-primary hover:bg-primary-hover text-white font-semibold py-3 rounded-xl transition-colors">Go to Login</a>
                    </div>`;
            } else {
                msg.textContent = res.error || "Verification failed.";
                msg.className = "text-sm text-center text-danger";
            }
        }

        // Auto-verify if token is in URL
        const urlToken = new URLSearchParams(window.location.search).get("token");
        if (urlToken) {
            msg.textContent = "Verifying...";
            msg.className = "text-sm text-center text-muted";
            doVerify(urlToken);
        }

        document.getElementById("verifyForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const code = document.getElementById("code").value.trim();
            if (!code) { msg.textContent = "Code required."; msg.className = "text-sm text-center text-danger"; return; }
            doVerify(code);
        });

        async function resendVerification() {
            const email = prompt("Enter your email address:");
            if (!email) return;
            const resp = await fetch("/users/resend-verification", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            const res = await resp.json().catch(() => ({}));
            if (resp.ok) {
                msg.textContent = res.message || "If an unverified account exists, a new code has been sent.";
                msg.className = "text-sm text-center text-success";
            } else {
                msg.textContent = res.error || "Failed to resend.";
                msg.className = "text-sm text-center text-danger";
            }
        }
    </script>
</body>
</html>
