<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    surface: '#0f1117',
                    card: '#181824',
                    'card-alt': '#1f1f2e',
                    border: '#2a2a3c',
                    primary: '#7c6aef',
                    'primary-hover': '#8f7ff7',
                    muted: '#6b6b80',
                    danger: '#f87171',
                },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            },
        },
    }
    </script>
    <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-surface text-gray-100 min-h-screen flex flex-col">

    <header class="fixed top-0 left-0 right-0 z-30 bg-card/80 backdrop-blur-md border-b border-border/50">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center">
            <a href="/" class="text-muted hover:text-white transition-colors flex items-center gap-1.5 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Home
            </a>
        </div>
    </header>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-card border border-border text-white p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
            <p id="modalMessage" class="mb-6 text-center"></p>
            <button id="modalOk" class="w-full bg-primary hover:bg-primary-hover text-white py-2.5 rounded-xl font-medium transition-colors">OK</button>
        </div>
    </div>

    <main class="flex-1 flex items-center justify-center px-4 pt-14">
        <div class="w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-8">Create your account</h1>
            <form id="signupForm" class="bg-card border border-border rounded-2xl p-6 sm:p-8 space-y-4">
                <input name="username" type="text" placeholder="Username"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" required>
                <input name="email" type="email" placeholder="Email"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" required>
                <input name="password" id="password" type="password" placeholder="Password"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" required>
                <input name="confirm_password" id="confirm_password" type="password" placeholder="Confirm password"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" required>
                <input name="referral_code" id="referral_code" type="text" placeholder="Referral code"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" required>
                <button type="submit" class="w-full bg-primary hover:bg-primary-hover text-white font-semibold py-3 rounded-xl transition-colors">Sign up</button>
                <p class="text-xs text-muted text-center">You need a referral code to create an account.</p>
                <p id="errorMessage" class="text-danger text-sm text-center"></p>
            </form>
            <p class="text-center text-sm text-gray-400 mt-5">Already have an account? <a href="/login" class="text-primary hover:text-primary-hover transition-colors">Sign in</a></p>
        </div>
    </main>

    <script>
        const form = document.getElementById("signupForm");
        const modal = document.getElementById("modal");
        const modalMessage = document.getElementById("modalMessage");
        const modalOk = document.getElementById("modalOk");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            if (!validateForm()) return;

            const response = await fetch("/users/signup", {
                method: "POST",
                headers: { "Accept": "application/json", "Content-Type": "application/json" },
                body: JSON.stringify({ username: data.username, email: data.email, password: data.password, referral_code: data.referral_code })
            });

            const result = await response.json();

            modalMessage.textContent = result.message || result.error || "Something happened.";
            modal.classList.remove("hidden");

            modalOk.onclick = () => {
                modal.classList.add("hidden");
                if (result.status === "success") { window.location.href = "/login"; }
            };
        });

        function validateForm() {
            const username = document.querySelector('input[name="username"]').value.trim();
            const email = document.querySelector('input[name="email"]').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorMessage = document.getElementById('errorMessage');

            const usernamePattern = /^[a-zA-Z0-9_.-]{3,30}$/;
            if (!usernamePattern.test(username)) {
                errorMessage.textContent = "Username must be 3-30 chars, letters/numbers/._- only.";
                return false;
            }

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                errorMessage.textContent = "Please enter a valid email address.";
                return false;
            }

            if (password !== confirmPassword) {
                errorMessage.textContent = "Passwords do not match.";
                return false;
            }

            if (password.length < 8) {
                errorMessage.textContent = "Password must be at least 8 characters.";
                return false;
            }

            errorMessage.textContent = "";
            return true;
        }
    </script>
</body>
</html>
