{% extends "base.html" %}

{% block title %}Event Detail{% endblock %}
{% block mobile_title %}EVENT{% endblock %}

{% block content %}
<main class="pt-8 pb-10 px-4 sm:px-6 max-w-5xl mx-auto">
    <div id="event-header" class="mb-6">
        <p class="text-muted">Loading...</p>
    </div>

    <!-- Action buttons -->
    <div id="action-buttons" class="flex flex-wrap gap-2 mb-6 hidden">
        <a id="replay-btn" href="/events/{{ event_id }}/replay" class="bg-success hover:bg-success-hover text-gray-900 text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors inline-block">
            Start Replay
        </a>
        <a id="add-questions-btn" href="/events/{{ event_id }}/add-questions" class="hidden bg-primary hover:bg-primary-hover text-white text-sm font-medium px-4 py-2.5 rounded-lg transition-colors inline-block">
            Add Questions
        </a>
        <button id="edit-btn" onclick="showEditForm()" class="hidden bg-warning/10 text-warning hover:bg-warning/20 text-sm font-medium px-4 py-2.5 rounded-lg transition-colors">
            Edit
        </button>
        <button id="delete-btn" onclick="deleteEvent()" class="hidden bg-danger/10 text-danger hover:bg-danger/20 text-sm font-medium px-4 py-2.5 rounded-lg transition-colors">
            Delete
        </button>
    </div>

    <!-- Edit Form (hidden by default) -->
    <div id="edit-form" class="bg-card border border-border rounded-xl p-6 mb-6 hidden">
        <h2 class="text-lg font-semibold mb-4">Edit Event</h2>
        <form onsubmit="saveEdit(event)" class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input id="edit-name" type="text" placeholder="Event name *" required
                class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm">
            <input id="edit-date" type="date"
                class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm">
            <input id="edit-location" type="text" placeholder="Location"
                class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm">
            <input id="edit-team-score" type="number" step="0.5" placeholder="Team score"
                class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm">
            <input id="edit-max-score" type="number" step="0.5" placeholder="Max possible score"
                class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm">
            <textarea id="edit-description" placeholder="Description" rows="2"
                class="bg-card-alt border border-border text-white rounded-lg px-3 py-2.5 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm md:col-span-2"></textarea>
            <div class="md:col-span-2 flex gap-2 justify-end">
                <button type="button" onclick="hideEditForm()" class="bg-card-alt hover:bg-border text-gray-300 text-sm font-medium px-4 py-2 rounded-lg border border-border transition-colors">Cancel</button>
                <button type="submit" class="bg-success hover:bg-success-hover text-gray-900 text-sm font-medium px-4 py-2 rounded-lg transition-colors">Save</button>
            </div>
        </form>
    </div>

    <!-- Questions list -->
    <div class="mb-8">
        <h2 class="text-lg font-semibold mb-3">Questions</h2>
        <div id="questions-list" class="bg-card border border-border rounded-xl overflow-hidden">
            <p class="px-4 py-6 text-muted text-center text-sm">Loading...</p>
        </div>
    </div>

    <!-- Leaderboard -->
    <div>
        <h2 class="text-lg font-semibold mb-3">Leaderboard</h2>
        <div id="leaderboard" class="bg-card border border-border rounded-xl overflow-hidden">
            <p class="px-4 py-6 text-muted text-center text-sm">Loading...</p>
        </div>
    </div>
</main>
{% endblock %}

{% block extra_scripts %}
<script>
    const EVENT_ID = "{{ event_id }}";
    let eventData = null;
    let currentUser = null;
    let isOwnerOrAdmin = false;

    function escHtml(str) {
        return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    async function init() {
        const [statusResp, eventResp] = await Promise.all([
            fetch("/login-status").then(r => r.json()).catch(() => ({})),
            fetch(`/api/events/${EVENT_ID}`).then(r => r.ok ? r.json() : null),
        ]);

        currentUser = statusResp;
        eventData = eventResp;

        if (!eventData) {
            document.getElementById("event-header").innerHTML = '<p class="text-danger">Event not found.</p>';
            return;
        }

        isOwnerOrAdmin = currentUser.logged_in && (currentUser.username === eventData.created_by || currentUser.role === "admin");

        renderHeader();
        document.getElementById("action-buttons").classList.remove("hidden");
        if (isOwnerOrAdmin) {
            document.getElementById("add-questions-btn").classList.remove("hidden");
            document.getElementById("edit-btn").classList.remove("hidden");
            document.getElementById("delete-btn").classList.remove("hidden");
        }

        loadQuestions();
        renderLeaderboard(eventData.leaderboard || []);
    }

    function renderHeader() {
        const e = eventData;
        const dateStr = e.date ? new Date(e.date).toLocaleDateString() : "";
        let meta = [];
        if (dateStr) meta.push(dateStr);
        if (e.location) meta.push(escHtml(e.location));
        if (e.team_score != null) meta.push(`Team score: ${e.team_score}`);
        if (e.max_score != null) meta.push(`Max: ${e.max_score}`);

        document.getElementById("event-header").innerHTML = `
            <h1 class="text-2xl font-bold mb-1">${escHtml(e.name)}</h1>
            ${meta.length ? `<p class="text-sm text-muted mb-2">${meta.join(" &middot; ")}</p>` : ""}
            ${e.description ? `<p class="text-sm text-gray-300">${escHtml(e.description)}</p>` : ""}
            <p class="text-xs text-muted mt-2">Created by ${escHtml(e.created_by)}</p>
        `;
    }

    async function loadQuestions() {
        const resp = await fetch(`/api/events/${EVENT_ID}/questions`);
        if (!resp.ok) return;
        const data = await resp.json();
        const items = data.items || [];
        const answersVisible = data.answers_visible === true;
        const container = document.getElementById("questions-list");

        if (!items.length) {
            container.innerHTML = '<p class="px-4 py-6 text-muted text-center text-sm">No questions yet.</p>';
            return;
        }

        const answerCell = answersVisible
            ? (q) => `<td class="px-4 py-3 text-muted">${escHtml(q.answer)}</td>`
            : () => `<td class="px-4 py-3 text-muted italic text-xs">Play to reveal</td>`;

        container.innerHTML = `<table class="w-full text-left text-sm">
            <thead><tr class="border-b border-border text-muted uppercase text-xs tracking-wider">
                <th class="px-4 py-3 font-medium w-8">#</th>
                <th class="px-4 py-3 font-medium">Question</th>
                <th class="px-4 py-3 font-medium">Answer</th>
                ${isOwnerOrAdmin ? '<th class="px-4 py-3 font-medium w-16">Actions</th>' : ''}
            </tr></thead>
            <tbody>${items.map((q, i) => `<tr class="border-b border-border/50 hover:bg-card-alt/50 transition-colors">
                <td class="px-4 py-3 text-muted">${i + 1}</td>
                <td class="px-4 py-3">${escHtml(q.question)}</td>
                ${answerCell(q)}
                ${isOwnerOrAdmin ? `<td class="px-4 py-3"><button onclick="removeQuestion('${q.question_id || q.id}')" class="text-xs text-danger hover:text-danger-hover transition-colors">Remove</button></td>` : ''}
            </tr>`).join("")}</tbody>
        </table>`;
    }

    function renderLeaderboard(items) {
        const container = document.getElementById("leaderboard");
        if (!items.length) {
            container.innerHTML = '<p class="px-4 py-6 text-muted text-center text-sm">No replays yet. Be the first!</p>';
            return;
        }

        container.innerHTML = `<table class="w-full text-left text-sm">
            <thead><tr class="border-b border-border text-muted uppercase text-xs tracking-wider">
                <th class="px-4 py-3 font-medium w-8">#</th>
                <th class="px-4 py-3 font-medium">Player</th>
                <th class="px-4 py-3 font-medium">Score</th>
                <th class="px-4 py-3 font-medium">Date</th>
            </tr></thead>
            <tbody>${items.map((r, i) => `<tr class="border-b border-border/50">
                <td class="px-4 py-3 text-muted">${i + 1}</td>
                <td class="px-4 py-3">${escHtml(r.display_name)}</td>
                <td class="px-4 py-3 font-semibold">${r.score}/${r.total}</td>
                <td class="px-4 py-3 text-muted text-xs">${r.completed_at ? new Date(r.completed_at).toLocaleDateString() : "-"}</td>
            </tr>`).join("")}</tbody>
        </table>`;
    }

    async function removeQuestion(qid) {
        if (!confirm("Remove this question from the event?")) return;
        const resp = await fetch(`/api/events/${EVENT_ID}/questions/${qid}`, { method: "DELETE" });
        if (resp.ok) loadQuestions();
        else alert("Failed to remove question.");
    }

    function showEditForm() {
        const e = eventData;
        document.getElementById("edit-name").value = e.name || "";
        document.getElementById("edit-date").value = e.date || "";
        document.getElementById("edit-location").value = e.location || "";
        document.getElementById("edit-team-score").value = e.team_score ?? "";
        document.getElementById("edit-max-score").value = e.max_score ?? "";
        document.getElementById("edit-description").value = e.description || "";
        document.getElementById("edit-form").classList.remove("hidden");
    }

    function hideEditForm() { document.getElementById("edit-form").classList.add("hidden"); }

    async function saveEdit(e) {
        e.preventDefault();
        const body = { name: document.getElementById("edit-name").value };
        const date = document.getElementById("edit-date").value;
        const location = document.getElementById("edit-location").value;
        const teamScore = document.getElementById("edit-team-score").value;
        const maxScore = document.getElementById("edit-max-score").value;
        const description = document.getElementById("edit-description").value;
        if (date) body.date = date; else body.date = null;
        if (location) body.location = location; else body.location = null;
        if (teamScore) body.team_score = parseFloat(teamScore); else body.team_score = null;
        if (maxScore) body.max_score = parseFloat(maxScore); else body.max_score = null;
        if (description) body.description = description; else body.description = null;

        const resp = await fetch(`/api/events/${EVENT_ID}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });
        if (resp.ok) {
            eventData = await resp.json();
            renderHeader();
            hideEditForm();
        } else {
            const err = await resp.json().catch(() => ({}));
            alert(err.error || "Failed to update event");
        }
    }

    async function deleteEvent() {
        const hasQuestions = (eventData.question_ids || []).length > 0;
        let deleteQuestions = false;
        if (hasQuestions) {
            const choice = confirm("This event has questions. Delete the questions too?\n\nOK = Delete event AND questions\nCancel = just cancel");
            if (!choice) {
                if (!confirm("Delete the event but keep the questions?")) return;
            } else {
                deleteQuestions = true;
            }
        } else {
            if (!confirm("Delete this event?")) return;
        }

        const url = `/api/events/${EVENT_ID}${deleteQuestions ? "?delete_questions=true" : ""}`;
        const resp = await fetch(url, { method: "DELETE" });
        if (resp.ok) {
            window.location.href = "/events";
        } else {
            const err = await resp.json().catch(() => ({}));
            alert(err.error || "Failed to delete event");
        }
    }

    document.addEventListener("DOMContentLoaded", init);
</script>
{% endblock %}
