<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    surface: '#0f1117', card: '#181824', 'card-alt': '#1f1f2e',
                    border: '#2a2a3c', primary: '#7c6aef', 'primary-hover': '#8f7ff7',
                    success: '#34d399', muted: '#6b6b80', danger: '#f87171',
                },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            },
        },
    }
    </script>
    <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-surface text-gray-100 min-h-screen flex flex-col">

    <header class="fixed top-0 left-0 right-0 z-30 bg-card/80 backdrop-blur-md border-b border-border/50">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center">
            <a href="/" class="text-muted hover:text-white transition-colors flex items-center gap-1.5 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Home
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 pt-14">
        <div class="w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-8">Reset password</h1>
            <form id="resetForm" class="bg-card border border-border rounded-2xl p-6 sm:p-8 space-y-4">
                <p class="text-sm text-muted text-center">Enter the 6-digit code from your email</p>
                <input id="code" type="text" placeholder="000000" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm text-center tracking-[0.3em] text-lg font-mono">
                <input id="password" type="password" placeholder="New password"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" required>
                <input id="confirm_password" type="password" placeholder="Confirm new password"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" required>
                <button type="submit" class="w-full bg-primary hover:bg-primary-hover text-white font-semibold py-3 rounded-xl transition-colors">Reset password</button>
                <p id="msg" class="text-sm text-center"></p>
            </form>
            <p class="text-center text-sm text-gray-400 mt-5"><a href="/login" class="text-primary hover:text-primary-hover transition-colors">Back to sign in</a></p>
        </div>
    </main>

    <script>
        // Pre-fill token from URL if present (from email link click)
        const urlToken = new URLSearchParams(window.location.search).get("token");
        const codeInput = document.getElementById("code");
        if (urlToken) {
            codeInput.value = urlToken;
            codeInput.type = "hidden";
            // Hide the code label since we have the token from the link
            codeInput.previousElementSibling.style.display = "none";
        }

        document.getElementById("resetForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const tokenOrCode = codeInput.value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm_password").value;
            const msg = document.getElementById("msg");

            if (!tokenOrCode) {
                msg.textContent = "Code required.";
                msg.className = "text-sm text-center text-danger";
                return;
            }
            if (password.length < 8) {
                msg.textContent = "Password must be at least 8 characters.";
                msg.className = "text-sm text-center text-danger";
                return;
            }
            if (password !== confirmPassword) {
                msg.textContent = "Passwords do not match.";
                msg.className = "text-sm text-center text-danger";
                return;
            }

            const resp = await fetch("/users/reset", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token: tokenOrCode, password })
            });
            const res = await resp.json().catch(() => ({}));
            if (resp.ok) {
                msg.textContent = "Password updated. You can now sign in.";
                msg.className = "text-sm text-center text-success";
            } else {
                msg.textContent = res.error || "Reset failed.";
                msg.className = "text-sm text-center text-danger";
            }
        });
    </script>
</body>
</html>
