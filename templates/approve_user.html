<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    surface: '#0f1117',
                    card: '#181824',
                    'card-alt': '#1f1f2e',
                    border: '#2a2a3c',
                    primary: '#7c6aef',
                    'primary-hover': '#8f7ff7',
                    success: '#34d399',
                    'success-hover': '#2bb886',
                    warning: '#fbbf24',
                    'warning-hover': '#f59e0b',
                    danger: '#f87171',
                    'danger-hover': '#ef4444',
                    muted: '#6b6b80',
                },
                fontFamily: {
                    sans: ['Inter', 'system-ui', 'sans-serif'],
                },
            },
        },
    }
    </script>
    <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-surface text-gray-100 min-h-screen">

    <header class="fixed top-0 left-0 right-0 z-30 bg-card/80 backdrop-blur-md border-b border-border/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <a href="/" class="text-muted hover:text-white transition-colors flex items-center gap-1.5 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Home
            </a>
            <a href="/logout" class="text-muted hover:text-white transition-colors text-sm">Sign out</a>
        </div>
    </header>

    <main class="pt-20 pb-10 px-4 sm:px-6 max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Manage Users</h1>

        <div class="bg-card border border-border rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm min-w-[780px]">
                    <thead>
                        <tr class="border-b border-border text-muted uppercase text-xs tracking-wider">
                            <th class="px-4 py-3 font-medium">Username</th>
                            <th class="px-4 py-3 font-medium">Email</th>
                            <th class="px-4 py-3 font-medium">Status</th>
                            <th class="px-4 py-3 font-medium">Joined</th>
                            <th class="px-4 py-3 font-medium">Last Login</th>
                            <th class="px-4 py-3 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Global actions dropdown — fixed position to avoid overflow-x clipping -->
    <div id="global-dd" class="hidden fixed z-50 bg-card border border-border rounded-lg shadow-2xl w-44 py-1 overflow-hidden"></div>

    <script>
        let usersData = [];
        let ddUser = null;

        function escHtml(str) {
            return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        function statusIcon(active, path, activeClass, label) {
            const cls = active ? activeClass : 'text-muted opacity-25';
            return `<span title="${label}" class="${cls}"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${path}"/></svg></span>`;
        }

        function menuItem(label, enabled, textClass, action) {
            if (enabled) {
                return `<button class="w-full text-left px-3 py-2 text-xs ${textClass} hover:bg-card-alt transition-colors" onclick="${action}">${label}</button>`;
            }
            return `<div class="px-3 py-2 text-xs text-muted/30 cursor-not-allowed select-none">${label}</div>`;
        }

        function closeDropdown() {
            document.getElementById('global-dd').classList.add('hidden');
            ddUser = null;
        }

        function openDropdown(idx, buttonEl) {
            const dd = document.getElementById('global-dd');
            const user = usersData[idx];

            // Toggle off if already open for the same row
            if (ddUser && ddUser.username === user.username && !dd.classList.contains('hidden')) {
                closeDropdown();
                return;
            }

            ddUser = user;
            const isAdmin = user.role === 'admin';
            const isApproved = user.is_approved === true;

            dd.innerHTML = `
                ${menuItem('Approve',         !isApproved, 'text-success', 'ddApprove()')}
                ${menuItem('Revoke Approval',  isApproved, 'text-warning', 'ddRevoke()')}
                <div class="border-t border-border/50 my-1"></div>
                ${menuItem('Make Admin',       !isAdmin,   'text-primary', 'ddMakeAdmin()')}
                ${menuItem('Remove Admin',      isAdmin,   'text-warning', 'ddRemoveAdmin()')}
                <div class="border-t border-border/50 my-1"></div>
                ${menuItem('Delete',            true,      'text-danger',  'ddDelete()')}
            `;

            const rect = buttonEl.getBoundingClientRect();
            dd.style.top   = (rect.bottom + 4) + 'px';
            dd.style.right = (window.innerWidth - rect.right) + 'px';
            dd.classList.remove('hidden');
        }

        // Capture username before closing (closeDropdown nulls ddUser)
        function ddApprove()      { const u = ddUser?.username; closeDropdown(); approveUser(u); }
        function ddRevoke()       { const u = ddUser?.username; closeDropdown(); rejectUser(u); }
        function ddMakeAdmin()    { const u = ddUser?.username; closeDropdown(); makeAdmin(u); }
        function ddRemoveAdmin()  { const u = ddUser?.username; closeDropdown(); removeAdmin(u); }
        function ddDelete()       { const u = ddUser?.username; closeDropdown(); deleteUser(u); }

        // Close on outside click
        document.addEventListener('click', (e) => {
            const dd = document.getElementById('global-dd');
            if (!dd.classList.contains('hidden') && !dd.contains(e.target) && !e.target.closest('[data-dd-btn]')) {
                closeDropdown();
            }
        });

        // Close on scroll (dropdown would drift away from its button)
        window.addEventListener('scroll', closeDropdown, { passive: true });

        async function loadUserbase() {
            try {
                const response = await fetch('/users/');
                if (!response.ok) { console.error('Error fetching userbase.'); return; }

                usersData = await response.json();
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';

                if (usersData.length === 0) {
                    userList.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-muted">No users found.</td></tr>`;
                    return;
                }

                usersData.forEach((user, idx) => {
                    const joined = user.created_at
                        ? new Date(user.created_at).toLocaleDateString()
                        : '-';

                    let lastLoginLine = '-';
                    if (user.last_login_at) {
                        const d = new Date(user.last_login_at);
                        lastLoginLine = d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
                    }
                    const ipLine = user.last_login_ip
                        ? `<span class="block text-muted/50 mt-0.5">${escHtml(user.last_login_ip)}</span>`
                        : '';

                    const row = document.createElement('tr');
                    row.className = "border-b border-border/50 hover:bg-card-alt/50 transition-colors";
                    row.innerHTML = `
                        <td class="px-4 py-3 font-medium">${escHtml(user.username)}</td>
                        <td class="px-4 py-3 text-gray-300 text-xs">${escHtml(user.email)}</td>
                        <td class="px-4 py-3">
                            <div class="flex items-center gap-2">
                                ${statusIcon(user.is_verified,      'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z', 'text-success', 'Email verified')}
                                ${statusIcon(user.is_approved,      'M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z', 'text-primary', 'Approved')}
                                ${statusIcon(user.role === 'admin', 'M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z', 'text-warning', 'Admin')}
                            </div>
                        </td>
                        <td class="px-4 py-3 text-muted text-xs">${joined}</td>
                        <td class="px-4 py-3 text-muted text-xs">${lastLoginLine}${ipLine}</td>
                        <td class="px-4 py-3 text-right">
                            <button data-dd-btn onclick="openDropdown(${idx}, this)"
                                class="text-xs font-medium px-2.5 py-1.5 rounded-md bg-card-alt hover:bg-border text-gray-300 transition-colors inline-flex items-center gap-1">
                                Actions
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                            </button>
                        </td>
                    `;
                    userList.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading userbase:', error);
            }
        }

        async function approveUser(username) {
            const response = await fetch(`/users/${encodeURIComponent(username)}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_approved: true })
            });
            if (response.ok) loadUserbase(); else alert('Failed to approve user');
        }

        async function rejectUser(username) {
            const response = await fetch(`/users/${encodeURIComponent(username)}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_approved: false })
            });
            if (response.ok) loadUserbase(); else alert('Failed to revoke approval');
        }

        async function makeAdmin(username) {
            const response = await fetch(`/users/${encodeURIComponent(username)}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'admin' })
            });
            if (response.ok) loadUserbase(); else alert('Failed to promote user');
        }

        async function removeAdmin(username) {
            const response = await fetch(`/users/${encodeURIComponent(username)}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'user' })
            });
            if (response.ok) loadUserbase(); else alert('Failed to remove admin rights');
        }

        async function deleteUser(username) {
            if (!confirm(`Delete user "${username}"?`)) return;
            const response = await fetch(`/users/${encodeURIComponent(username)}`, { method: 'DELETE' });
            if (response.ok) loadUserbase(); else alert('Failed to delete user');
        }

        document.addEventListener('DOMContentLoaded', loadUserbase);
    </script>
</body>
</html>
