<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    surface: '#0f1117',
                    card: '#181824',
                    'card-alt': '#1f1f2e',
                    border: '#2a2a3c',
                    primary: '#7c6aef',
                    'primary-hover': '#8f7ff7',
                    success: '#34d399',
                    'success-hover': '#2bb886',
                    warning: '#fbbf24',
                    'warning-hover': '#f59e0b',
                    danger: '#f87171',
                    'danger-hover': '#ef4444',
                    muted: '#6b6b80',
                },
                fontFamily: {
                    sans: ['Inter', 'system-ui', 'sans-serif'],
                },
            },
        },
    }
    </script>
    <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-surface text-gray-100 min-h-screen">

    <header class="fixed top-0 left-0 right-0 z-30 bg-card/80 backdrop-blur-md border-b border-border/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <a href="/" class="text-muted hover:text-white transition-colors flex items-center gap-1.5 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Home
            </a>
            <a href="/logout" class="text-muted hover:text-white transition-colors text-sm">Sign out</a>
        </div>
    </header>

    <main class="pt-20 pb-10 px-4 sm:px-6 max-w-5xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Manage Users</h1>

        <div class="bg-card border border-border rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm min-w-[600px]">
                    <thead>
                        <tr class="border-b border-border text-muted uppercase text-xs tracking-wider">
                            <th class="px-4 py-3 font-medium">Username</th>
                            <th class="px-4 py-3 font-medium">Email</th>
                            <th class="px-4 py-3 font-medium">Verified</th>
                            <th class="px-4 py-3 font-medium">Approved</th>
                            <th class="px-4 py-3 font-medium">Created</th>
                            <th class="px-4 py-3 font-medium">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function escHtml(str) {
            return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        async function loadUserbase() {
            try {
                const response = await fetch('/users/');
                if (!response.ok) { console.error('Error fetching userbase.'); return; }

                const users = await response.json();
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';

                if (users.length === 0) {
                    userList.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-muted">No users found.</td></tr>`;
                    return;
                }

                users.forEach(user => {
                    const row = document.createElement('tr');
                    row.className = "border-b border-border/50 hover:bg-card-alt/50 transition-colors";
                    row.innerHTML = `
                        <td class="px-4 py-3 font-medium">${escHtml(user.username)}</td>
                        <td class="px-4 py-3 text-gray-300">${escHtml(user.email)}</td>
                        <td class="px-4 py-3">${user.is_verified ? '<span class="text-success text-xs font-medium">Yes</span>' : '<span class="text-muted text-xs">No</span>'}</td>
                        <td class="px-4 py-3">${user.is_approved ? '<span class="text-success text-xs font-medium">Yes</span>' : '<span class="text-muted text-xs">No</span>'}</td>
                        <td class="px-4 py-3 text-muted">${user.created_at ? new Date(user.created_at).toLocaleDateString() : '-'}</td>
                        <td class="px-4 py-3">
                            <div class="flex gap-1.5 flex-wrap">
                                <button class="text-xs font-medium px-2.5 py-1.5 rounded-md bg-success/10 text-success hover:bg-success/20 transition-colors" onclick="approveUser('${escHtml(user.username)}')">Approve</button>
                                <button class="text-xs font-medium px-2.5 py-1.5 rounded-md bg-primary/10 text-primary hover:bg-primary/20 transition-colors" onclick="rejectUser('${escHtml(user.username)}')">Reject</button>
                                <button class="text-xs font-medium px-2.5 py-1.5 rounded-md bg-warning/10 text-warning hover:bg-warning/20 transition-colors" onclick="makeAdmin('${escHtml(user.username)}')">Make Admin</button>
                                <button class="text-xs font-medium px-2.5 py-1.5 rounded-md bg-danger/10 text-danger hover:bg-danger/20 transition-colors" onclick="deleteUser('${escHtml(user.username)}')">Delete</button>
                            </div>
                        </td>
                    `;
                    userList.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading userbase:', error);
            }
        }

        async function approveUser(username) {
            const response = await fetch(`/users/${encodeURIComponent(username)}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_approved: true })
            });
            if (response.ok) loadUserbase(); else alert('Failed to approve user');
        }

        async function rejectUser(username) {
            const response = await fetch(`/users/${encodeURIComponent(username)}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_approved: false })
            });
            if (response.ok) loadUserbase(); else alert('Failed to reject user');
        }

        async function makeAdmin(username) {
            const response = await fetch(`/users/${encodeURIComponent(username)}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'admin' })
            });
            if (response.ok) loadUserbase(); else alert('Failed to promote user');
        }

        async function deleteUser(username) {
            if (!confirm(`Delete user "${username}"?`)) return;
            const response = await fetch(`/users/${encodeURIComponent(username)}`, { method: 'DELETE' });
            if (response.ok) loadUserbase(); else alert('Failed to delete user');
        }

        document.addEventListener('DOMContentLoaded', loadUserbase);
    </script>
</body>
</html>
