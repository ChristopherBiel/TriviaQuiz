<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    surface: '#0f1117',
                    card: '#181824',
                    'card-alt': '#1f1f2e',
                    border: '#2a2a3c',
                    primary: '#7c6aef',
                    'primary-hover': '#8f7ff7',
                    muted: '#6b6b80',
                    danger: '#f87171',
                },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            },
        },
    }
    </script>
    <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-surface text-gray-100 min-h-screen flex flex-col">

    <header class="fixed top-0 left-0 right-0 z-30 bg-card/80 backdrop-blur-md border-b border-border/50">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center">
            <a href="/" class="text-muted hover:text-white transition-colors flex items-center gap-1.5 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Home
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 pt-14">
        <div class="w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-8">Sign in</h1>
            <form id="loginForm" class="bg-card border border-border rounded-2xl p-6 sm:p-8 space-y-4">
                <input id="username" name="username" type="text" placeholder="Username"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" required>
                <input id="password" name="password" type="password" placeholder="Password"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" required>
                <button type="submit" class="w-full bg-primary hover:bg-primary-hover text-white font-semibold py-3 rounded-xl transition-colors">Sign in</button>
                <p id="loginError" class="text-sm text-center hidden"></p>
            </form>
            <div class="text-center mt-5 space-y-2">
                <p class="text-sm text-gray-400">Don't have an account? <a href="/signup" class="text-primary hover:text-primary-hover transition-colors">Sign up</a></p>
                <p class="text-sm"><a href="#" onclick="requestReset()" class="text-muted hover:text-gray-300 transition-colors">Forgot password?</a></p>
            </div>
        </div>
    </main>

    <script>
        const loginError = document.getElementById("loginError");

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            loginError.classList.add("hidden");

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError("Username and password cannot be empty.");
                return;
            }

            const resp = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            if (resp.ok) {
                window.location.href = "/";
            } else {
                const err = await resp.json().catch(() => ({}));
                const errorMsg = err.error || "Login failed";

                if (errorMsg.includes("verification")) {
                    showError(errorMsg + ' <a href="/verify_email" class="text-primary hover:text-primary-hover underline">Verify now</a>', true);
                } else {
                    showError(errorMsg);
                }
            }
        });

        function showError(message, isHtml = false) {
            loginError.classList.remove("hidden");
            loginError.className = "text-sm text-center text-danger";
            if (isHtml) {
                loginError.innerHTML = message;
            } else {
                loginError.textContent = message;
            }
        }

        async function requestReset() {
            const email = prompt("Enter your email address for password reset:");
            if (!email) return;
            const resp = await fetch("/users/request-reset", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            if (resp.ok) {
                alert("If an account exists with that email, a reset code has been sent. Check your inbox.");
                window.location.href = "/reset_password";
            } else {
                const res = await resp.json().catch(() => ({}));
                alert(res.error || "Failed to request reset.");
            }
        }
    </script>
</body>
</html>
