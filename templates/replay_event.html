{% extends "base.html" %}

{% block title %}Replay Event{% endblock %}
{% block mobile_title %}REPLAY{% endblock %}

{% block content %}
<main class="min-h-[calc(100dvh-3.5rem)] md:min-h-screen flex items-center justify-center px-4 py-10">
    <div id="app" class="w-full max-w-2xl transition-all">
        <p class="text-center text-muted">Loading...</p>
    </div>
</main>
{% endblock %}

{% block extra_scripts %}
<script>
    const EVENT_ID = "{{ event_id }}";
    let replayData = null;
    let currentIdx = 0;
    let userAnswers = [];
    let loginStatus = { logged_in: false };
    let savedToLeaderboard = false;

    function escHtml(str) {
        return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    const app = document.getElementById("app");

    async function init() {
        const [statusResp, replayResp] = await Promise.all([
            fetch("/login-status").then(r => r.json()).catch(() => ({ logged_in: false })),
            fetch(`/api/events/${EVENT_ID}/replay`, { method: "POST" }),
        ]);

        loginStatus = statusResp;

        if (!replayResp.ok) {
            app.innerHTML = '<p class="text-danger text-center">Event not found.</p>';
            return;
        }
        replayData = await replayResp.json();
        userAnswers = replayData.questions.map(q => ({ question_id: q.question_id, answer: "" }));
        showStart();
    }

    function setWide(wide) {
        app.classList.toggle("max-w-2xl", !wide);
        app.classList.toggle("max-w-5xl", wide);
    }

    function showStart() {
        setWide(false);
        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-8 text-center">
                <h1 class="text-2xl font-bold mb-2">${escHtml(replayData.name)}</h1>
                ${replayData.description ? `<p class="text-sm text-gray-300 mb-4">${escHtml(replayData.description)}</p>` : ""}
                <p class="text-muted mb-6">${replayData.total} question${replayData.total !== 1 ? "s" : ""}</p>
                <button onclick="showQuestion(0)" class="bg-success hover:bg-success-hover text-gray-900 font-semibold py-3 px-8 rounded-xl transition-colors">
                    Begin
                </button>
            </div>`;
    }

    function showQuestion(idx) {
        setWide(false);
        currentIdx = idx;
        const q = replayData.questions[idx];
        const isLast = idx === replayData.questions.length - 1;
        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-6 sm:p-8">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs text-muted">Question ${idx + 1} of ${replayData.total}</span>
                    <div class="w-full max-w-[200px] ml-4 bg-card-alt rounded-full h-1.5">
                        <div class="bg-primary h-1.5 rounded-full transition-all" style="width: ${((idx + 1) / replayData.total) * 100}%"></div>
                    </div>
                </div>
                <h2 class="text-lg font-semibold mb-4">${escHtml(q.question)}</h2>
                ${q.media_path ? `<img src="${escHtml(q.media_path)}" class="max-h-48 rounded-lg mb-4" alt="Question media">` : ""}
                <input id="answer-input" type="text" placeholder="Your answer..." autofocus
                    value="${escHtml(userAnswers[idx].answer)}"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm mb-4"
                    onkeydown="if(event.key==='Enter'){event.preventDefault();${isLast ? 'goToReview()' : `nextQuestion(${idx})`}}">
                <div class="flex justify-between">
                    ${idx > 0 ? `<button onclick="saveAndGo(${idx}, ${idx - 1})" class="text-sm text-muted hover:text-white transition-colors">Previous</button>` : '<div></div>'}
                    ${isLast
                        ? `<button onclick="goToReview()" class="bg-primary hover:bg-primary-hover text-white font-medium py-2 px-6 rounded-lg transition-colors text-sm">Review Answers</button>`
                        : `<button onclick="nextQuestion(${idx})" class="bg-primary hover:bg-primary-hover text-white font-medium py-2 px-6 rounded-lg transition-colors text-sm">Next</button>`
                    }
                </div>
            </div>`;
        document.getElementById("answer-input").focus();
    }

    function nextQuestion(fromIdx) {
        saveAndGo(fromIdx, fromIdx + 1);
    }

    function saveAndGo(fromIdx, toIdx) {
        userAnswers[fromIdx].answer = document.getElementById("answer-input").value;
        showQuestion(toIdx);
    }

    function goToReview() {
        userAnswers[currentIdx].answer = document.getElementById("answer-input").value;
        showReview();
    }

    function showReview() {
        setWide(true);
        const rows = replayData.questions.map((q, i) => `
            <tr class="border-b border-border/50">
                <td class="px-4 py-3 text-muted text-xs">${i + 1}</td>
                <td class="px-4 py-3 text-sm">${escHtml(q.question)}</td>
                <td class="px-4 py-3 text-sm">
                    <input type="text" value="${escHtml(userAnswers[i].answer)}" data-idx="${i}"
                        class="w-full bg-card-alt border border-border text-white rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary/50"
                        onchange="userAnswers[${i}].answer = this.value">
                </td>
            </tr>
        `).join("");

        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-6 sm:p-8">
                <h2 class="text-lg font-semibold mb-4">Review Your Answers</h2>
                <div class="overflow-x-auto mb-4">
                    <table class="w-full text-left text-sm">
                        <thead><tr class="border-b border-border text-muted uppercase text-xs tracking-wider">
                            <th class="px-4 py-2 w-8">#</th>
                            <th class="px-4 py-2">Question</th>
                            <th class="px-4 py-2">Your Answer</th>
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
                <div class="flex justify-between">
                    <button onclick="showQuestion(${replayData.questions.length - 1})" class="text-sm text-muted hover:text-white transition-colors">Back</button>
                    <button onclick="submitAnswers()" class="bg-success hover:bg-success-hover text-gray-900 font-semibold py-2 px-6 rounded-lg transition-colors text-sm">
                        Submit
                    </button>
                </div>
            </div>`;
    }

    function showEvaluating() {
        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-8 text-center">
                <div class="inline-block mb-4">
                    <svg class="animate-spin h-8 w-8 text-primary mx-auto" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </div>
                <h2 class="text-lg font-semibold mb-2">Evaluating your answers...</h2>
                <p class="text-sm text-muted">This may take a moment</p>
            </div>`;
    }

    async function submitAnswers() {
        showEvaluating();
        // Phase 1: evaluate only (no DB save)
        const body = { answers: userAnswers };
        const resp = await fetch(`/api/events/${EVENT_ID}/replay/evaluate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });
        if (!resp.ok) {
            alert("Failed to evaluate answers.");
            showReview();
            return;
        }
        savedToLeaderboard = false;
        const result = await resp.json();
        showResults(result);
    }

    function showResults(result) {
        setWide(true);
        const answers = result.answers || [];
        const rows = answers.map((a, i) => {
            const bgClass = a.is_correct ? "bg-success/5" : "bg-danger/5";
            const icon = a.is_correct ? '<span class="text-success font-bold">&#10003;</span>' : '<span class="text-danger font-bold">&#10007;</span>';
            const overrideBtn = a.is_correct
                ? `<button onclick="overrideAnswer(${i}, false)" class="text-xs text-danger hover:underline">Mark wrong</button>`
                : `<button onclick="overrideAnswer(${i}, true)" class="text-xs text-success hover:underline">Mark correct</button>`;
            const infoBtn = a.explanation
                ? `<button onclick="toggleExplanation(this)" class="text-muted hover:text-white transition-colors" title="${escHtml(a.explanation)}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  </button>`
                : "";
            const explanationRow = a.explanation
                ? `<tr class="hidden explanation-row border-b border-border/50 ${bgClass}">
                    <td colspan="7" class="px-4 py-2">
                        <span class="text-xs text-muted italic">${escHtml(a.explanation)}</span>
                    </td>
                  </tr>`
                : "";
            return `<tr class="border-b border-border/50 ${bgClass}">
                <td class="px-4 py-3 text-xs text-muted">${i + 1}</td>
                <td class="px-4 py-3 text-sm">${escHtml(replayData.questions[i]?.question || "")}</td>
                <td class="px-4 py-3 text-sm">${escHtml(a.user_answer)}</td>
                <td class="px-4 py-3 text-sm text-muted">${escHtml(a.correct_answer)}</td>
                <td class="px-4 py-3">${icon}</td>
                <td class="px-4 py-3">${infoBtn}</td>
                <td class="px-4 py-3">${overrideBtn}</td>
            </tr>${explanationRow}`;
        }).join("");

        // Save-to-leaderboard section
        let saveSection = "";
        if (loginStatus.logged_in && !savedToLeaderboard) {
            saveSection = `
                <div id="save-section" class="text-center mb-4">
                    <button id="save-btn" onclick="saveToLeaderboard()" class="bg-primary hover:bg-primary-hover text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
                        Save to Leaderboard
                    </button>
                </div>`;
        } else if (savedToLeaderboard) {
            saveSection = `
                <div class="text-center mb-4">
                    <p class="text-success text-sm font-medium">Score saved to leaderboard!</p>
                </div>`;
        } else {
            saveSection = `
                <div class="text-center mb-4">
                    <p class="text-muted text-xs">Log in to save your score to the leaderboard</p>
                </div>`;
        }

        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-6 sm:p-8">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold mb-1">Score: ${result.score} / ${result.total}</h2>
                    <p class="text-sm text-muted">${Math.round((result.score / Math.max(result.total, 1)) * 100)}% correct</p>
                </div>
                <div class="overflow-x-auto mb-4">
                    <table class="w-full text-left text-sm">
                        <thead><tr class="border-b border-border text-muted uppercase text-xs tracking-wider">
                            <th class="px-4 py-2 w-8">#</th>
                            <th class="px-4 py-2">Question</th>
                            <th class="px-4 py-2">Your Answer</th>
                            <th class="px-4 py-2">Correct Answer</th>
                            <th class="px-4 py-2 w-8"></th>
                            <th class="px-4 py-2 w-8"></th>
                            <th class="px-4 py-2 w-20"></th>
                        </tr></thead>
                        <tbody id="results-body">${rows}</tbody>
                    </table>
                </div>
                <div id="override-notice" class="hidden text-center mb-4">
                    <button onclick="resubmitWithOverrides()" class="bg-primary hover:bg-primary-hover text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                        Re-evaluate with overrides
                    </button>
                </div>
                ${saveSection}
                <div class="flex justify-center gap-3">
                    <a href="/events/${EVENT_ID}" class="bg-card-alt hover:bg-border text-gray-300 text-sm font-medium px-4 py-2 rounded-lg border border-border transition-colors">Back to Event</a>
                    <a href="/events/${EVENT_ID}/replay" class="bg-success hover:bg-success-hover text-gray-900 text-sm font-semibold px-4 py-2 rounded-lg transition-colors">Play Again</a>
                </div>
            </div>`;

        window._lastResult = result;
    }

    function toggleExplanation(btn) {
        const row = btn.closest("tr");
        const next = row.nextElementSibling;
        if (next && next.classList.contains("explanation-row")) {
            next.classList.toggle("hidden");
        }
    }

    function overrideAnswer(idx, isCorrect) {
        userAnswers[idx].override = isCorrect;
        document.getElementById("override-notice").classList.remove("hidden");
        // Hide save button when overrides change (need to re-evaluate first)
        const saveSection = document.getElementById("save-section");
        if (saveSection) saveSection.classList.add("hidden");
    }

    async function resubmitWithOverrides() {
        showEvaluating();
        // Re-evaluate with overrides (no DB save)
        const body = { answers: userAnswers };
        const resp = await fetch(`/api/events/${EVENT_ID}/replay/evaluate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });
        if (!resp.ok) { alert("Failed to re-evaluate."); return; }
        savedToLeaderboard = false;
        const result = await resp.json();
        showResults(result);
    }

    async function saveToLeaderboard() {
        const btn = document.getElementById("save-btn");
        btn.disabled = true;
        btn.textContent = "Saving...";

        const body = { answers: userAnswers };
        const resp = await fetch(`/api/events/${EVENT_ID}/replay/submit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });
        if (!resp.ok) {
            btn.disabled = false;
            btn.textContent = "Save to Leaderboard";
            const err = await resp.json().catch(() => ({}));
            alert(err.error || "Failed to save score.");
            return;
        }
        savedToLeaderboard = true;
        const result = await resp.json();
        showResults(result);
    }

    document.addEventListener("DOMContentLoaded", init);
</script>
{% endblock %}
