{% extends "base.html" %}

{% block title %}Replay Event{% endblock %}
{% block mobile_title %}REPLAY{% endblock %}

{% block content %}
<main class="min-h-[calc(100dvh-3.5rem)] md:min-h-screen flex items-center justify-center px-4 py-10">
    <div id="app" class="w-full max-w-2xl transition-all">
        <p class="text-center text-muted">Loading...</p>
    </div>
</main>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center cursor-zoom-out hidden" onclick="closeLightbox()">
    <button class="absolute top-4 right-4 text-white/60 hover:text-white transition-colors z-10 cursor-pointer" onclick="closeLightbox()">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div id="lightbox-content" class="flex items-center justify-center cursor-default" onclick="event.stopPropagation()"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const EVENT_ID = "{{ event_id }}";
    let replayData = null;
    let currentIdx = 0;
    let userAnswers = [];
    let loginStatus = { logged_in: false };
    let savedToLeaderboard = false;

    function escHtml(str) {
        return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    const app = document.getElementById("app");

    async function init() {
        const [statusResp, replayResp] = await Promise.all([
            fetch("/login-status").then(r => r.json()).catch(() => ({ logged_in: false })),
            fetch(`/api/events/${EVENT_ID}/replay`, { method: "POST" }),
        ]);

        loginStatus = statusResp;

        if (!replayResp.ok) {
            app.innerHTML = '<p class="text-danger text-center">Event not found.</p>';
            return;
        }
        replayData = await replayResp.json();
        userAnswers = replayData.questions.map(q => ({ question_id: q.question_id, answer: "" }));
        showStart();
    }

    function setWide(wide) {
        app.classList.toggle("max-w-2xl", !wide);
        app.classList.toggle("max-w-5xl", wide);
    }

    function showStart() {
        setWide(false);
        const qCount = replayData.question_count || replayData.questions.length;
        const totalPts = replayData.total;
        const pointsNote = totalPts > qCount
            ? `<p class="text-muted mb-6">${qCount} question${qCount !== 1 ? "s" : ""}, ${totalPts} points</p>`
            : `<p class="text-muted mb-6">${qCount} question${qCount !== 1 ? "s" : ""}</p>`;
        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-8 text-center">
                <h1 class="text-2xl font-bold mb-2">${escHtml(replayData.name)}</h1>
                ${replayData.description ? `<p class="text-sm text-gray-300 mb-4">${escHtml(replayData.description)}</p>` : ""}
                ${pointsNote}
                <button onclick="showQuestion(0)" class="bg-success hover:bg-success-hover text-gray-900 font-semibold py-3 px-8 rounded-xl transition-colors">
                    Begin
                </button>
            </div>`;
    }

    function showQuestion(idx) {
        setWide(false);
        currentIdx = idx;
        const q = replayData.questions[idx];
        const isLast = idx === replayData.questions.length - 1;
        const pts = q.points || 1;
        const ptsBadge = pts > 1 ? `<span class="ml-2 text-xs bg-primary/20 text-primary px-2 py-0.5 rounded-full">${pts} pts</span>` : "";
        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-6 sm:p-8">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs text-muted">Question ${idx + 1} of ${replayData.questions.length}${ptsBadge}</span>
                    <div class="w-full max-w-[200px] ml-4 bg-card-alt rounded-full h-1.5">
                        <div class="bg-primary h-1.5 rounded-full transition-all" style="width: ${((idx + 1) / replayData.questions.length) * 100}%"></div>
                    </div>
                </div>
                <h2 class="text-lg font-semibold mb-4">${escHtml(q.question)}</h2>
                ${q.media_text ? `<blockquote class="w-full text-center px-4 py-5 italic text-base text-white leading-relaxed bg-card-alt border border-border rounded-xl mb-4">\u201c${escHtml(q.media_text)}\u201d</blockquote>` : q.media_path ? (() => {
                    const clean = escHtml(q.media_path).split("?")[0];
                    const ext = clean.split(".").pop().toLowerCase();
                    if (["mp3", "wav", "ogg"].includes(ext))
                        return `<div class="w-full bg-card-alt rounded-xl p-3 mb-4"><audio controls class="w-full" style="color-scheme:dark"><source src="${escHtml(q.media_path)}" type="audio/${ext === "mp3" ? "mpeg" : ext}"></audio></div>`;
                    if (["mp4", "webm"].includes(ext))
                        return `<div class="relative inline-block mb-4"><video controls class="max-h-48 rounded-lg"><source src="${escHtml(q.media_path)}" type="video/${ext}"></video><button onclick="openLightbox('${escHtml(q.media_path)}', 'video')" class="absolute top-1 right-1 bg-black/60 hover:bg-black/90 text-white rounded-full p-1.5 transition-colors" title="Expand"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg></button></div>`;
                    return `<img src="${escHtml(q.media_path)}" class="max-h-48 rounded-lg mb-4 cursor-zoom-in" onclick="openLightbox('${escHtml(q.media_path)}', 'image')" title="Click to enlarge" alt="Question media">`;
                })() : ""}
                <input id="answer-input" type="text" placeholder="Your answer..." autofocus
                    value="${escHtml(userAnswers[idx].answer)}"
                    class="w-full bg-card-alt border border-border text-white rounded-lg px-3 py-3 placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm mb-4"
                    onkeydown="if(event.key==='Enter'){event.preventDefault();${isLast ? 'goToReview()' : `nextQuestion(${idx})`}}">
                <div class="flex justify-between">
                    ${idx > 0 ? `<button onclick="saveAndGo(${idx}, ${idx - 1})" class="text-sm text-muted hover:text-white transition-colors">Previous</button>` : '<div></div>'}
                    ${isLast
                        ? `<button onclick="goToReview()" class="bg-primary hover:bg-primary-hover text-white font-medium py-2 px-6 rounded-lg transition-colors text-sm">Review Answers</button>`
                        : `<button onclick="nextQuestion(${idx})" class="bg-primary hover:bg-primary-hover text-white font-medium py-2 px-6 rounded-lg transition-colors text-sm">Next</button>`
                    }
                </div>
            </div>`;
        document.getElementById("answer-input").focus();
    }

    function nextQuestion(fromIdx) {
        saveAndGo(fromIdx, fromIdx + 1);
    }

    function saveAndGo(fromIdx, toIdx) {
        userAnswers[fromIdx].answer = document.getElementById("answer-input").value;
        showQuestion(toIdx);
    }

    function goToReview() {
        userAnswers[currentIdx].answer = document.getElementById("answer-input").value;
        showReview();
    }

    function showReview() {
        setWide(true);
        const rows = replayData.questions.map((q, i) => `
            <tr class="border-b border-border/50">
                <td class="px-4 py-3 text-muted text-xs">${i + 1}</td>
                <td class="px-4 py-3 text-sm">${escHtml(q.question)}</td>
                <td class="px-4 py-3 text-sm">
                    <input type="text" value="${escHtml(userAnswers[i].answer)}" data-idx="${i}"
                        class="w-full bg-card-alt border border-border text-white rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary/50"
                        onchange="userAnswers[${i}].answer = this.value">
                </td>
            </tr>
        `).join("");

        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-6 sm:p-8">
                <h2 class="text-lg font-semibold mb-4">Review Your Answers</h2>
                <div class="overflow-x-auto mb-4">
                    <table class="w-full text-left text-sm">
                        <thead><tr class="border-b border-border text-muted uppercase text-xs tracking-wider">
                            <th class="px-4 py-2 w-8">#</th>
                            <th class="px-4 py-2">Question</th>
                            <th class="px-4 py-2">Your Answer</th>
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
                <div class="flex justify-between">
                    <button onclick="showQuestion(${replayData.questions.length - 1})" class="text-sm text-muted hover:text-white transition-colors">Back</button>
                    <button onclick="submitAnswers()" class="bg-success hover:bg-success-hover text-gray-900 font-semibold py-2 px-6 rounded-lg transition-colors text-sm">
                        Submit
                    </button>
                </div>
            </div>`;
    }

    function showEvaluating() {
        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-8 text-center">
                <div class="inline-block mb-4">
                    <svg class="animate-spin h-8 w-8 text-primary mx-auto" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </div>
                <h2 class="text-lg font-semibold mb-2">Evaluating your answers...</h2>
                <p class="text-sm text-muted">This may take a moment</p>
            </div>`;
    }

    async function submitAnswers() {
        showEvaluating();
        // Phase 1: evaluate only (no DB save)
        const body = { answers: userAnswers };
        const resp = await fetch(`/api/events/${EVENT_ID}/replay/evaluate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });
        if (!resp.ok) {
            alert("Failed to evaluate answers.");
            showReview();
            return;
        }
        savedToLeaderboard = false;
        const result = await resp.json();
        showResults(result);
    }

    function getPointsIcon(pointsAwarded, maxPoints) {
        if (maxPoints <= 1) {
            return pointsAwarded >= 1
                ? '<span class="text-success font-bold">&#10003;</span>'
                : '<span class="text-danger font-bold">&#10007;</span>';
        }
        if (pointsAwarded === maxPoints) {
            return `<span class="text-success font-bold">&#10003; ${pointsAwarded}/${maxPoints}</span>`;
        }
        if (pointsAwarded === 0) {
            return `<span class="text-danger font-bold">&#10007; 0/${maxPoints}</span>`;
        }
        return `<span class="text-amber-400 font-bold">${pointsAwarded}/${maxPoints}</span>`;
    }

    function getRowBgClass(pointsAwarded, maxPoints) {
        if (pointsAwarded === maxPoints) return "bg-success/5";
        if (pointsAwarded === 0) return "bg-danger/5";
        return "bg-amber-400/5";
    }

    function buildOverrideControl(idx, pointsAwarded, maxPoints) {
        if (maxPoints <= 1) {
            // Simple toggle for 1-point questions
            return pointsAwarded >= 1
                ? `<button id="override-btn-${idx}" onclick="overrideAnswer(${idx}, 0)" class="text-xs text-danger hover:underline">Mark wrong</button>`
                : `<button id="override-btn-${idx}" onclick="overrideAnswer(${idx}, 1)" class="text-xs text-success hover:underline">Mark correct</button>`;
        }
        // Multi-point: show point selector buttons
        let buttons = [];
        for (let p = 0; p <= maxPoints; p++) {
            const isActive = p === pointsAwarded;
            const cls = isActive
                ? "text-xs font-bold text-white bg-primary rounded px-1.5 py-0.5"
                : "text-xs text-muted hover:text-white hover:bg-card-alt rounded px-1.5 py-0.5";
            buttons.push(`<button onclick="overrideAnswer(${idx}, ${p})" class="${cls}">${p}</button>`);
        }
        return `<span id="override-btn-${idx}" class="inline-flex gap-0.5">${buttons.join("")}</span>`;
    }

    function showResults(result) {
        setWide(true);
        const answers = result.answers || [];
        const rows = answers.map((a, i) => {
            const pts = a.points_awarded ?? (a.is_correct ? (a.max_points || 1) : 0);
            const maxPts = a.max_points || 1;
            const bgClass = getRowBgClass(pts, maxPts);
            const icon = getPointsIcon(pts, maxPts);
            const overrideCtrl = buildOverrideControl(i, pts, maxPts);
            const infoBtn = a.explanation
                ? `<button onclick="toggleExplanation(this)" class="text-muted hover:text-white transition-colors" title="${escHtml(a.explanation)}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  </button>`
                : "";
            const explanationRow = a.explanation
                ? `<tr class="hidden explanation-row border-b border-border/50 ${bgClass}">
                    <td colspan="7" class="px-4 py-2">
                        <span class="text-xs text-muted italic">${escHtml(a.explanation)}</span>
                    </td>
                  </tr>`
                : "";
            return `<tr id="answer-row-${i}" class="border-b border-border/50 ${bgClass}">
                <td class="px-4 py-3 text-xs text-muted">${i + 1}</td>
                <td class="px-4 py-3 text-sm">${escHtml(replayData.questions[i]?.question || "")}</td>
                <td class="px-4 py-3 text-sm">${escHtml(a.user_answer)}</td>
                <td class="px-4 py-3 text-sm text-muted">${escHtml(a.correct_answer)}</td>
                <td id="answer-icon-${i}" class="px-4 py-3">${icon}</td>
                <td class="px-4 py-3">${infoBtn}</td>
                <td class="px-4 py-3">${overrideCtrl}</td>
            </tr>${explanationRow}`;
        }).join("");

        // Save-to-leaderboard section
        let saveSection = "";
        if (loginStatus.logged_in && !savedToLeaderboard) {
            saveSection = `
                <div id="save-section" class="text-center mb-4">
                    <button id="save-btn" onclick="saveToLeaderboard()" class="bg-primary hover:bg-primary-hover text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
                        Save to Leaderboard
                    </button>
                </div>`;
        } else if (savedToLeaderboard) {
            saveSection = `
                <div class="text-center mb-4">
                    <p class="text-success text-sm font-medium">Score saved to leaderboard!</p>
                </div>`;
        } else {
            saveSection = `
                <div class="text-center mb-4">
                    <p class="text-muted text-xs">Log in to save your score to the leaderboard</p>
                </div>`;
        }

        app.innerHTML = `
            <div class="bg-card border border-border rounded-2xl p-6 sm:p-8">
                <div class="text-center mb-6">
                    <h2 id="score-display" class="text-2xl font-bold mb-1">Score: ${result.score} / ${result.total}</h2>
                    <p id="pct-display" class="text-sm text-muted">${Math.round((result.score / Math.max(result.total, 1)) * 100)}% correct</p>
                </div>
                <div class="overflow-x-auto mb-4">
                    <table class="w-full text-left text-sm">
                        <thead><tr class="border-b border-border text-muted uppercase text-xs tracking-wider">
                            <th class="px-4 py-2 w-8">#</th>
                            <th class="px-4 py-2">Question</th>
                            <th class="px-4 py-2">Your Answer</th>
                            <th class="px-4 py-2">Correct Answer</th>
                            <th class="px-4 py-2 w-8"></th>
                            <th class="px-4 py-2 w-8"></th>
                            <th class="px-4 py-2 w-20"></th>
                        </tr></thead>
                        <tbody id="results-body">${rows}</tbody>
                    </table>
                </div>
                ${saveSection}
                <div class="flex justify-center gap-3">
                    <a href="/events/${EVENT_ID}" class="bg-card-alt hover:bg-border text-gray-300 text-sm font-medium px-4 py-2 rounded-lg border border-border transition-colors">Back to Event</a>
                    <a href="/events/${EVENT_ID}/replay" class="bg-success hover:bg-success-hover text-gray-900 text-sm font-semibold px-4 py-2 rounded-lg transition-colors">Play Again</a>
                </div>
            </div>`;

        window._lastResult = result;
    }

    function toggleExplanation(btn) {
        const row = btn.closest("tr");
        const next = row.nextElementSibling;
        if (next && next.classList.contains("explanation-row")) {
            next.classList.toggle("hidden");
        }
    }

    function overrideAnswer(idx, pointsToAward) {
        const a = window._lastResult && window._lastResult.answers[idx];
        const maxPts = (a && a.max_points) || (replayData.questions[idx]?.points || 1);

        // Store override as integer
        userAnswers[idx].override = pointsToAward;

        // Update stored result
        if (a) {
            a.points_awarded = pointsToAward;
            a.is_correct = (pointsToAward === maxPts);
        }

        // Update row background
        const row = document.getElementById(`answer-row-${idx}`);
        if (row) {
            row.classList.remove("bg-success/5", "bg-danger/5", "bg-amber-400/5");
            row.classList.add(getRowBgClass(pointsToAward, maxPts));
            const next = row.nextElementSibling;
            if (next && next.classList.contains("explanation-row")) {
                next.classList.remove("bg-success/5", "bg-danger/5", "bg-amber-400/5");
                next.classList.add(getRowBgClass(pointsToAward, maxPts));
            }
        }

        // Update icon
        const iconCell = document.getElementById(`answer-icon-${idx}`);
        if (iconCell) {
            iconCell.innerHTML = getPointsIcon(pointsToAward, maxPts);
        }

        // Update override control
        const btnContainer = document.getElementById(`override-btn-${idx}`);
        if (btnContainer) {
            btnContainer.outerHTML = buildOverrideControl(idx, pointsToAward, maxPts);
        }

        // Recalculate and update score display
        if (window._lastResult) {
            const newScore = window._lastResult.answers.reduce((sum, ans) => {
                return sum + (ans.points_awarded ?? (ans.is_correct ? (ans.max_points || 1) : 0));
            }, 0);
            const total = window._lastResult.total;
            window._lastResult.score = newScore;
            const scoreEl = document.getElementById("score-display");
            if (scoreEl) scoreEl.textContent = `Score: ${newScore} / ${total}`;
            const pctEl = document.getElementById("pct-display");
            if (pctEl) pctEl.textContent = `${Math.round((newScore / Math.max(total, 1)) * 100)}% correct`;
        }

        // Re-show save section
        const saveSection = document.getElementById("save-section");
        if (saveSection) saveSection.classList.remove("hidden");
    }

    async function resubmitWithOverrides() {
        showEvaluating();
        // Re-evaluate with overrides (no DB save)
        const body = { answers: userAnswers };
        const resp = await fetch(`/api/events/${EVENT_ID}/replay/evaluate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });
        if (!resp.ok) { alert("Failed to re-evaluate."); return; }
        savedToLeaderboard = false;
        const result = await resp.json();
        showResults(result);
    }

    async function saveToLeaderboard() {
        const btn = document.getElementById("save-btn");
        btn.disabled = true;
        btn.textContent = "Saving...";

        const body = { answers: userAnswers };
        const resp = await fetch(`/api/events/${EVENT_ID}/replay/submit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });
        if (!resp.ok) {
            btn.disabled = false;
            btn.textContent = "Save to Leaderboard";
            const err = await resp.json().catch(() => ({}));
            alert(err.error || "Failed to save score.");
            return;
        }
        savedToLeaderboard = true;
        const result = await resp.json();
        showResults(result);
    }

    function openLightbox(src, type) {
        const content = document.getElementById("lightbox-content");
        if (type === "image") {
            content.innerHTML = `<img src="${src}" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg shadow-2xl">`;
        } else {
            const ext = src.split("?")[0].split(".").pop().toLowerCase();
            content.innerHTML = `<video controls autoplay class="max-w-[90vw] max-h-[90vh] rounded-lg shadow-2xl"><source src="${src}" type="video/${ext}"></video>`;
        }
        document.getElementById("lightbox").classList.remove("hidden");
        document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
        document.getElementById("lightbox-content").innerHTML = "";
        document.getElementById("lightbox").classList.add("hidden");
        document.body.style.overflow = "";
    }

    document.addEventListener("DOMContentLoaded", init);
</script>
{% endblock %}
