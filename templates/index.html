{% extends "base.html" %}

{% block title %}Trivia Quiz{% endblock %}
{% block mobile_title %}TRIVIA QUIZ{% endblock %}

{% block sidebar_extra %}
<div>
    <p class="text-xs font-semibold uppercase tracking-wider text-muted mb-2 px-3">Filters</p>
    <div class="space-y-3 px-1">
        <div>
            <label class="text-xs text-gray-400 mb-1 block">Language</label>
            <select id="language-select" class="w-full bg-card-alt border border-border text-white text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50"></select>
        </div>
        <div>
            <label class="text-xs text-gray-400 mb-1 block">Topic</label>
            <select id="topic-select" class="w-full bg-card-alt border border-border text-white text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50"></select>
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
<main class="min-h-[calc(100dvh-3.5rem)] md:min-h-screen flex items-center justify-center px-4 pt-6 pb-28">
    <div class="w-full max-w-lg">
        <div class="bg-card border border-border rounded-2xl p-6 md:p-8 flex flex-col gap-5">
            <div>
                <p id="question" class="text-xl md:text-2xl font-semibold leading-relaxed">Loading...</p>
            </div>
            <div id="media" class="flex justify-center items-center rounded-xl empty:hidden"></div>
            <div id="answer-zone" class="border border-dashed border-border rounded-xl p-4 text-center transition-all duration-300">
                <p id="answer-label" class="text-xs text-emerald-500/70 uppercase tracking-wide mb-1 hidden">Answer</p>
                <p id="answer" class="text-lg text-muted">???</p>
            </div>
        </div>
    </div>
</main>

<!-- Fixed action button -->
<div class="fixed bottom-0 left-0 md:left-64 right-0 px-4 pb-6 pt-4 bg-gradient-to-t from-surface to-transparent">
    <div class="max-w-lg mx-auto">
        <button id="main-btn" onclick="handleMainButton()"
            class="w-full py-3.5 rounded-xl font-semibold text-base transition-all duration-200 bg-warning hover:bg-warning-hover text-gray-900">
            Reveal Answer
        </button>
    </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center cursor-zoom-out hidden" onclick="closeLightbox()">
    <button class="absolute top-4 right-4 text-white/60 hover:text-white transition-colors z-10 cursor-pointer" onclick="closeLightbox()">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div id="lightbox-content" class="flex items-center justify-center cursor-default" onclick="event.stopPropagation()"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    let filterOptions = {
        language: "English",
        question_topic: "General",
        tags: []
    };

    let answerRevealed = false;

    async function loadQuestion() {
        try {
            let seen = JSON.parse(sessionStorage.getItem("seenQuestions") || "[]");

            const activeFilters = { no_incorrect_answers: true };
            if (filterOptions.language) activeFilters.language = filterOptions.language;
            if (filterOptions.question_topic) activeFilters.question_topic = filterOptions.question_topic;
            if (filterOptions.tags && filterOptions.tags.length > 0) activeFilters.tags = filterOptions.tags;

            let response = await fetch("/questions/random", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ seen, filters: activeFilters })
            });

            if (response.status === 404) {
                sessionStorage.setItem("seenQuestions", JSON.stringify([]));
                return loadQuestion();
            }

            let data = await response.json();

            seen.push(data.id);
            sessionStorage.setItem("seenQuestions", JSON.stringify(seen));

            document.getElementById("question").innerText = data.question || "No question found";

            // Reset answer state
            const answerEl = document.getElementById("answer");
            const answerLabel = document.getElementById("answer-label");
            const zone = document.getElementById("answer-zone");
            answerEl.innerText = "???";
            answerEl.dataset.answer = data.answer || "Unknown";
            answerEl.className = "text-lg text-muted";
            answerLabel.classList.add("hidden");
            zone.className = "border border-dashed border-border rounded-xl p-4 text-center transition-all duration-300";
            answerRevealed = false;
            setButtonState("reveal");

            let mediaContainer = document.getElementById("media");
            mediaContainer.innerHTML = "";

            const escHtml = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
            const mediaText = data.media_text;
            const mediaPath = data.media_path;
            if (mediaText) {
                mediaContainer.innerHTML = `<blockquote class="w-full text-center px-6 py-6 italic text-lg text-white leading-relaxed">\u201c${escHtml(mediaText)}\u201d</blockquote>`;
            } else if (mediaPath) {
                const cleanUrl = mediaPath.split("?")[0];
                const fileType = cleanUrl.split(".").pop().toLowerCase();
                if (["jpg", "jpeg", "png", "gif", "webp"].includes(fileType)) {
                    mediaContainer.innerHTML = `<img src="${mediaPath}" class="max-w-full max-h-[280px] object-contain rounded-xl cursor-zoom-in" onclick="openLightbox('${mediaPath}', 'image')" title="Click to enlarge" />`;
                } else if (["mp4", "webm"].includes(fileType)) {
                    mediaContainer.innerHTML = `<div class="relative inline-block"><video controls class="max-w-full max-h-[280px] object-contain rounded-xl"><source src="${mediaPath}" type="video/${fileType}"></video><button onclick="openLightbox('${mediaPath}', 'video')" class="absolute top-1 right-1 bg-black/60 hover:bg-black/90 text-white rounded-full p-1.5 transition-colors" title="Expand"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg></button></div>`;
                } else if (["mp3", "wav", "ogg"].includes(fileType)) {
                    mediaContainer.innerHTML = `<div class="w-full bg-card-alt rounded-xl p-3"><audio controls class="w-full" style="color-scheme:dark"><source src="${mediaPath}" type="audio/${fileType === "mp3" ? "mpeg" : fileType}"></audio></div>`;
                } else {
                    mediaContainer.innerHTML = `<a class="text-primary hover:text-primary-hover underline" href="${mediaPath}" target="_blank">View media</a>`;
                }
            }
        } catch (error) {
            document.getElementById("question").innerText = "Error loading question!";
            console.error("Error fetching question:", error);
        }
    }

    function revealAnswer() {
        const answerEl = document.getElementById("answer");
        const answerLabel = document.getElementById("answer-label");
        const zone = document.getElementById("answer-zone");
        answerLabel.classList.remove("hidden");
        answerEl.innerText = answerEl.dataset.answer;
        answerEl.className = "text-lg font-medium text-emerald-400";
        zone.className = "border border-emerald-500/20 bg-emerald-500/5 rounded-xl p-4 text-center transition-all duration-300";
        answerRevealed = true;
        setButtonState("next");
    }

    function handleMainButton() {
        if (answerRevealed) { loadQuestion(); } else { revealAnswer(); }
    }

    function setButtonState(state) {
        const btn = document.getElementById("main-btn");
        btn.classList.remove("bg-warning", "hover:bg-warning-hover", "text-gray-900",
                             "bg-primary", "hover:bg-primary-hover", "text-white");
        if (state === "reveal") {
            btn.textContent = "Reveal Answer";
            btn.classList.add("bg-warning", "hover:bg-warning-hover", "text-gray-900");
        } else {
            btn.textContent = "Next Question";
            btn.classList.add("bg-primary", "hover:bg-primary-hover", "text-white");
        }
    }

    async function loadMetadata() {
        try {
            const response = await fetch("/questions/metadata");
            const data = await response.json();
            populateDropdown("language-select", data.languages, "language");
            populateDropdown("topic-select", data.topics, "question_topic");
        } catch (err) {
            console.error("Error loading metadata:", err);
        }
    }

    function populateDropdown(id, options, filterKey) {
        const allLabel = filterKey === "language" ? "All Languages" : "All Topics";
        const defaultValue = filterOptions[filterKey];
        const select = document.getElementById(id);
        if (!select) return;
        select.innerHTML = `<option value="">${allLabel}</option>`;
        options.forEach(opt => {
            const option = document.createElement("option");
            option.value = opt;
            option.innerText = opt;
            if (opt === defaultValue) option.selected = true;
            select.appendChild(option);
        });
        select.addEventListener("change", (e) => {
            filterOptions[filterKey] = e.target.value;
            loadQuestion();
        });
    }

    function openLightbox(src, type) {
        const content = document.getElementById("lightbox-content");
        if (type === "image") {
            content.innerHTML = `<img src="${src}" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg shadow-2xl">`;
        } else {
            const ext = src.split("?")[0].split(".").pop().toLowerCase();
            content.innerHTML = `<video controls autoplay class="max-w-[90vw] max-h-[90vh] rounded-lg shadow-2xl"><source src="${src}" type="video/${ext}"></video>`;
        }
        document.getElementById("lightbox").classList.remove("hidden");
        document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
        document.getElementById("lightbox-content").innerHTML = "";
        document.getElementById("lightbox").classList.add("hidden");
        document.body.style.overflow = "";
    }

    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeLightbox(); });

    document.addEventListener("DOMContentLoaded", () => {
        loadMetadata();
        loadQuestion();
    });
</script>
{% endblock %}
