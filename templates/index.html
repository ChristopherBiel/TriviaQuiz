<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        let filterOptions = {
            language: "English",
            question_topic: "General",
            tags: []
        };

        // Whether the current question's answer is visible
        let answerRevealed = false;

        async function loadQuestion() {
            try {
                let seen = JSON.parse(sessionStorage.getItem("seenQuestions") || "[]");

                // Only include filters that have a real value
                const activeFilters = {};
                if (filterOptions.language) activeFilters.language = filterOptions.language;
                if (filterOptions.question_topic) activeFilters.question_topic = filterOptions.question_topic;
                if (filterOptions.tags && filterOptions.tags.length > 0) activeFilters.tags = filterOptions.tags;

                let response = await fetch("/questions/random", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ seen, filters: activeFilters })
                });

                if (response.status === 404) {
                    sessionStorage.setItem("seenQuestions", JSON.stringify([]));
                    return loadQuestion();
                }

                let data = await response.json();

                seen.push(data.id);
                sessionStorage.setItem("seenQuestions", JSON.stringify(seen));

                document.getElementById("question").innerText = data.question || "No question found";

                // Reset answer state
                const answerEl = document.getElementById("answer");
                answerEl.innerText = "???";
                answerEl.dataset.answer = data.answer || "Unknown";
                answerRevealed = false;
                setButtonState("reveal");

                let mediaContainer = document.getElementById("media");
                mediaContainer.innerHTML = "";

                const mediaPath = data.media_path;
                if (mediaPath) {
                    const cleanUrl = mediaPath.split("?")[0];
                    const fileType = cleanUrl.split(".").pop().toLowerCase();
                    if (["jpg", "jpeg", "png", "gif", "webp"].includes(fileType)) {
                        mediaContainer.innerHTML = `<img src="${mediaPath}" class="max-w-full max-h-full object-contain rounded-lg shadow-md" />`;
                    } else if (["mp4", "webm"].includes(fileType)) {
                        mediaContainer.innerHTML = `<video controls class="max-w-full max-h-full object-contain rounded-lg shadow-md"><source src="${mediaPath}" type="video/${fileType}"></video>`;
                    } else if (["mp3", "wav", "ogg"].includes(fileType)) {
                        mediaContainer.innerHTML = `<audio controls class="w-full"><source src="${mediaPath}" type="audio/${fileType === "mp3" ? "mpeg" : fileType}"></audio>`;
                    } else {
                        mediaContainer.innerHTML = `<a class="text-blue-400 underline" href="${mediaPath}" target="_blank">View media</a>`;
                    }
                }
            } catch (error) {
                document.getElementById("question").innerText = "Error loading question!";
                console.error("Error fetching question:", error);
            }
        }

        function revealAnswer() {
            const answerEl = document.getElementById("answer");
            answerEl.innerText = "Answer: " + answerEl.dataset.answer;
            answerRevealed = true;
            setButtonState("next");
        }

        // Single button handles both states
        function handleMainButton() {
            if (answerRevealed) {
                loadQuestion();
            } else {
                revealAnswer();
            }
        }

        function setButtonState(state) {
            const btn = document.getElementById("main-btn");
            if (state === "reveal") {
                btn.textContent = "Reveal Answer";
                btn.className = "mt-4 bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded";
            } else {
                btn.textContent = "Next Question";
                btn.className = "mt-4 bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded";
            }
        }

        // Metadata loading and dropdown setup
        async function loadMetadata() {
            try {
                const response = await fetch("/questions/metadata");
                const data = await response.json();

                populateDropdown("language-select-desktop", "language-select-mobile", data.languages, "language");
                populateDropdown("topic-select-desktop", "topic-select-mobile", data.topics, "question_topic");
                populateMultiselect("tags-select", data.tags);
            } catch (err) {
                console.error("Error loading metadata:", err);
            }
        }

        function populateDropdown(desktopId, mobileId, options, filterKey) {
            const allLabel = filterKey === "language" ? "All Languages" : "All Topics";
            const defaultValue = filterOptions[filterKey];
            [desktopId, mobileId].forEach(id => {
                const select = document.getElementById(id);
                if (!select) return;
                select.innerHTML = `<option value="">${allLabel}</option>`;
                options.forEach(opt => {
                    const option = document.createElement("option");
                    option.value = opt;
                    option.innerText = opt;
                    if (opt === defaultValue) option.selected = true;
                    select.appendChild(option);
                });
                select.addEventListener("change", (e) => {
                    filterOptions[filterKey] = e.target.value;
                    // Sync the other dropdown to the same value
                    const otherId = id === desktopId ? mobileId : desktopId;
                    const other = document.getElementById(otherId);
                    if (other) other.value = e.target.value;
                    loadQuestion();
                });
            });
        }

        function populateMultiselect(id, options) {
            const select = document.getElementById(id);
            if (!select) return;
            select.innerHTML = "";
            options.forEach(opt => {
                const option = document.createElement("option");
                option.value = opt;
                option.innerText = opt;
                select.appendChild(option);
            });

            select.addEventListener("change", () => {
                const selected = Array.from(select.selectedOptions).map(opt => opt.value);
                filterOptions.tags = selected;
                loadQuestion();
            });
        }
    </script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white text-center p-4">
    <div class="w-full flex justify-between items-center p-4 absolute top-0 left-0">
        <script>
            async function checkLoginStatus() {
                try {
                    let response = await fetch("/login-status");
                    let data = await response.json();
                    let loginContainer = document.getElementById("login-container");

                    if (data.logged_in) {
                        loginContainer.innerHTML = `<a href="/logout" class="text-white hover:underline text-lg sm:text-sm">Logout</a>`;
                    } else {
                        loginContainer.innerHTML = `<a href="/login" class="text-white hover:underline text-lg sm:text-sm">Login</a>`;
                    }

                    const desktopSection = document.getElementById("manage-section-desktop");
                    const mobileSection = document.getElementById("manage-section-mobile");

                    if (!data.logged_in) {
                        desktopSection.innerHTML = `<p class="text-sm text-gray-400">Login to manage</p>`;
                        mobileSection.innerHTML = `<p class="text-sm text-gray-400">Login to manage</p>`;
                    } else if (data.role === "user") {
                        const html = `
                            <a href="/new_question" class="block py-1 hover:underline">New Question</a>
                            <a href="/edit_question" class="block py-1 hover:underline" style="pointer-events: none; color: gray;">Manage Own Questions</a>
                        `;
                        desktopSection.innerHTML = html;
                        mobileSection.innerHTML = html;
                    } else if (data.role === "admin") {
                        const html = `
                            <a href="/new_question" class="block py-1 hover:underline">New Question</a>
                            <a href="/approve_question" class="block py-1 hover:underline">Approve Questions</a>
                            <a href="/database" class="block py-1 hover:underline">Manage Questions</a>
                            <a href="/approve_user" class="block py-1 hover:underline">Manage Users</a>
                        `;
                        desktopSection.innerHTML = html;
                        mobileSection.innerHTML = html;
                    }
                } catch (error) {
                    console.error("Error checking login status:", error);
                }
            }

            document.addEventListener("DOMContentLoaded", () => {
                checkLoginStatus();
                loadMetadata();
                loadQuestion();
            });
        </script>

        <div id="login-container" class="ml-auto"></div>

        <!-- Sidebar Menu (Desktop) -->
        <div class="hidden md:flex flex-col w-64 h-screen bg-gray-800 text-white fixed top-0 left-0 pt-16 px-4 space-y-6 overflow-y-auto">
            <div>
                <h2 class="text-lg font-semibold mb-2">Game Mode</h2>
                <a href="/" class="block py-1 hover:underline">Normal</a>
                <a href="/replay_event" class="block py-1 hover:underline" style="pointer-events: none; color: gray;">Replay Event</a>
            </div>
            <div class="h-8"></div>
            <div>
                <h2 class="text-lg font-semibold mb-2">Filters</h2>
                <label class="block mb-2">Language:
                    <select id="language-select-desktop" class="text-black w-full mt-1 rounded p-1"></select>
                </label>
                <label class="block mb-2">Topic:
                    <select id="topic-select-desktop" class="text-black w-full mt-1 rounded p-1"></select>
                </label>
            </div>
            <div class="h-8"></div>
            <div>
                <h2 class="text-lg font-semibold mb-2">Manage Questions</h2>
                <div id="manage-section-desktop">Loading...</div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="md:hidden">
            <button id="hamburger" class="fixed top-4 left-4 z-50 text-white text-3xl">☰</button>

            <div id="mobile-menu" class="fixed top-0 left-0 w-full h-full bg-gray-900 bg-opacity-95 text-white flex-col items-center justify-center hidden z-40 overflow-y-auto">
                <div class="text-center">
                    <h2 class="text-xl font-bold my-4">Game Mode</h2>
                    <a href="/" class="block my-2">Normal</a>
                    <a href="/replay_event" class="block my-2">Replay Event</a>
                    <a href="/subject" class="block my-2">Subject Specific</a>

                    <h2 class="text-xl font-bold mt-6 mb-4">Filters</h2>
                    <label class="block mb-2">Language:
                        <select id="language-select-mobile" class="text-black w-64 mt-1 rounded p-1"></select>
                    </label>
                    <label class="block mb-2">Topic:
                        <select id="topic-select-mobile" class="text-black w-64 mt-1 rounded p-1"></select>
                    </label>
                    <label class="block mb-2">Tags:
                        <select id="tags-select" multiple class="text-black w-64 mt-1 rounded p-1 h-24"></select>
                    </label>

                    <h2 class="text-xl font-bold mt-6 mb-4">Manage Questions</h2>
                    <div id="manage-section-mobile">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <h1 class="text-4xl font-bold mb-6">Trivia Game</h1>
    <div class="bg-gray-800 p-6 rounded-lg shadow-lg w-full max-w-md h-[600px] flex flex-col justify-between overflow-hidden">
        <p id="question" class="text-xl mb-4 overflow-y-auto max-h-[150px]">Loading...</p>
        <p id="answer" class="text-lg text-blue-400">???</p>
        <div id="media" class="mt-4 flex-grow overflow-hidden flex justify-center items-center max-h-[300px]"></div>
        <button id="main-btn" onclick="handleMainButton()" class="mt-4 bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded">Reveal Answer</button>
    </div>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById("mobile-menu");
            menu.classList.toggle("hidden");
            menu.classList.toggle("flex");
        }

        document.getElementById("hamburger").addEventListener("click", toggleMobileMenu);
    </script>
</body>
</html>
