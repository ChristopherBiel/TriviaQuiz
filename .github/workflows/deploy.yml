name: Test and Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trivia_test
          POSTGRES_USER: trivia
          POSTGRES_PASSWORD: trivia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trivia -d trivia_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      STORE_BACKEND: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: trivia_test
      POSTGRES_USER: trivia
      POSTGRES_PASSWORD: trivia
      POSTGRES_AUTO_CREATE: "1"
      SECRET_KEY: test-secret
      MEDIA_STORE: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest --ignore=tests/services/user_services_test.py

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > private_key
          chmod 600 private_key
          RC=1
          for attempt in 1 2 3; do
            echo "SSH attempt $attempt/3..."
            ssh -o StrictHostKeyChecking=no \
                -o ConnectTimeout=15 \
                -o ServerAliveInterval=60 \
                -o ServerAliveCountMax=3 \
                -i private_key \
                "$VPS_USER@$VPS_HOST" << 'ENDSSH' && RC=0 && break || RC=$?
            set -e
            cd ~/TriviaQuiz
            git pull origin main
            docker compose -f docker/docker-compose.yml --env-file .env build app
            docker compose -f docker/docker-compose.yml --env-file .env up -d
            docker compose -f docker/docker-compose.yml --env-file .env run --rm app alembic upgrade head
          ENDSSH
            if [ $RC -ne 0 ] && [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed (exit $RC), retrying in 20s..."
              sleep 20
            fi
          done
          rm -f private_key
          exit $RC

  bump-version:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        run: |
          VERSION=$(cat VERSION)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          echo "$MAJOR.$MINOR.$NEW_PATCH" > VERSION

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $(cat VERSION) [skip ci]"
          git push
