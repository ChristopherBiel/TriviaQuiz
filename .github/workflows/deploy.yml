name: Test and Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trivia_test
          POSTGRES_USER: trivia
          POSTGRES_PASSWORD: trivia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trivia -d trivia_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      STORE_BACKEND: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: trivia_test
      POSTGRES_USER: trivia
      POSTGRES_PASSWORD: trivia
      POSTGRES_AUTO_CREATE: "1"
      SECRET_KEY: test-secret
      MEDIA_STORE: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --ignore=tests/services/user_services_test.py

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > private_key
          chmod 600 private_key
          ssh -o StrictHostKeyChecking=no -i private_key $VPS_USER@$VPS_HOST << 'EOF'
            set -e
            cd ~/TriviaQuiz
            git pull origin main
            docker compose -f docker/docker-compose.yml --env-file .env build app
            docker compose -f docker/docker-compose.yml --env-file .env up -d
            docker compose -f docker/docker-compose.yml --env-file .env run --rm app alembic upgrade head
          EOF
          rm -f private_key
